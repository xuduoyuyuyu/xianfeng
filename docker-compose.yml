services:
  mongo:
    image: mongo:7
    container_name: xianfeng_mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xianfeng_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=${PORT:-3001}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/xianfeng}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - ALLOW_PUBLIC_REGISTER=${ALLOW_PUBLIC_REGISTER:-false}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_TRANSCRIBE_MODEL=${AI_TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}
      - AI_TEXT_MODEL=${AI_TEXT_MODEL:-gpt-4o-mini}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL_ID=${DEEPSEEK_MODEL_ID:-jiahewanshi}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - VOLCENGINE_APP_ID=${VOLCENGINE_APP_ID:-}
      - VOLCENGINE_ACCESS_TOKEN=${VOLCENGINE_ACCESS_TOKEN:-}
      - VOLCENGINE_API_KEY=${VOLCENGINE_API_KEY:-}
      - VOLCENGINE_SECRET_KEY=${VOLCENGINE_SECRET_KEY:-}
      - VOLCENGINE_RESOURCE_ID=${VOLCENGINE_RESOURCE_ID:-volc.bigasr.auc_turbo,volc.bigasr.auc}
      - VOLCENGINE_MODE=${VOLCENGINE_MODE:-flash}
      - VOLCENGINE_PUBLIC_BASE_URL=${VOLCENGINE_PUBLIC_BASE_URL:-}
      - VOLCENGINE_FETCH_TIMEOUT_MS=${VOLCENGINE_FETCH_TIMEOUT_MS:-180000}
      - ARK_API_KEY=${ARK_API_KEY:-}
      - ARK_MODEL_ID=${ARK_MODEL_ID:-}
      - ARK_BASE_URL=${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: xianfeng_frontend
    restart: unless-stopped
    depends_on:
      - backend

  gateway:
    image: nginx:1.27-alpine
    container_name: xianfeng_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
