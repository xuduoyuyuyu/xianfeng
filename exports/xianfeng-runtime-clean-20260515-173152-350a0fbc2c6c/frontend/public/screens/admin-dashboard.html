<!DOCTYPE html>
<html class="dark" data-theme="dark" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>家长先疯 | 先疯管理 - 数据概览</title>
    <link href="/screens/admin.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          const t = localStorage.getItem("adminTheme");
          if (t === "light") {
            document.documentElement.dataset.theme = "light";
            document.documentElement.classList.remove("dark");
          }
        } catch (_e) {}
      })();
    </script>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        background-color: var(--panel);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-image: radial-gradient(var(--grid) 1px, transparent 1px);
        background-size: 56px 56px;
      }
      :root {
        --panel: #0b1020;
        --panel2: #0e1630;
        --ink: #e6e9f2;
        --muted: #98a2b3;
        --line: rgba(255, 255, 255, 0.08);
        --grid: rgba(94, 23, 235, 0.18);
        --r-shell: 28px;
        --r-card: 22px;
        --r-item: 16px;
        --r-control: 14px;
        --r-pill: 9999px;
      }
      html[data-theme="light"] {
        --panel: #f6f7fb;
        --panel2: #ffffff;
        --ink: #0f172a;
        --muted: #475569;
        --line: rgba(15, 23, 42, 0.12);
        --grid: rgba(94, 23, 235, 0.07);
      }
      html[data-theme="light"] .shadow-glow {
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.06), 0 18px 48px -28px rgba(15, 23, 42, 0.28) !important;
      }
      html[data-theme="light"] [class*="hover:bg-white/5"]:hover {
        background: rgba(15, 23, 42, 0.04) !important;
      }
      html[data-theme="light"] [class*="bg-white/5"] {
        background: rgba(15, 23, 42, 0.03) !important;
      }
      html[data-theme="light"] [class*="bg-white/10"] {
        background: rgba(15, 23, 42, 0.06) !important;
      }
      html[data-theme="light"] [class*="ring-white/10"] {
        box-shadow: inset 0 0 0 1px rgba(94, 23, 235, 0.16) !important;
      }
      .theme-toggle {
        border-radius: var(--r-pill) !important;
        overflow: hidden;
      }
      .theme-toggle button[data-active="true"] {
        background: rgba(94, 23, 235, 0.14);
        color: #5e17eb;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen">
      <aside class="fixed inset-y-0 left-0 w-[280px] border-r border-line bg-panel/70 backdrop-blur-xl">
        <div class="flex h-full flex-col">
          <div class="flex items-center gap-3 px-6 pt-6 pb-5">
            <img alt="家长先疯" class="h-8 w-auto object-contain" src="/assets/logo.png" />
          </div>
          <nav class="flex-1 px-4 pb-4">
            <div class="mb-3 px-2 text-[11px] font-black uppercase tracking-[0.22em] text-muted/70">导航</div>
            <a
              data-nav="dashboard"
              href="/admin"
              class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5"
            >
              <span class="material-symbols-outlined text-[20px]">space_dashboard</span>
              数据概览
            </a>
            <div class="mt-6 mb-3 px-2 text-[11px] font-black uppercase tracking-[0.22em] text-muted/70">内容管理</div>
            <a
              data-nav="programs"
              href="/admin/programs"
              class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5"
            >
              <span class="material-symbols-outlined text-[20px]">podcasts</span>
              播客管理
            </a>
            <a
              data-nav="books"
              href="/admin/books"
              class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5"
            >
              <span class="material-symbols-outlined text-[20px]">menu_book</span>
              书单管理
            </a>
            <a
              data-nav="materials"
              href="/admin/materials"
              class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5"
            >
              <span class="material-symbols-outlined text-[20px]">school</span>
              学习资料
            </a>
            <div class="mt-6 mb-3 px-2 text-[11px] font-black uppercase tracking-[0.22em] text-muted/70">系统</div>
            <a
              data-nav="users"
              href="/admin/users"
              class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5"
            >
              <span class="material-symbols-outlined text-[20px]">group</span>
              用户管理
            </a>
            <a
              data-nav="system"
              href="/admin/system"
              class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5"
            >
              <span class="material-symbols-outlined text-[20px]">settings</span>
              系统信息
            </a>
          </nav>
          <div class="border-t border-line p-4">
            <div class="flex items-center justify-between rounded-2xl bg-white/5 px-4 py-3">
              <div class="flex items-center gap-3">
                <div id="admin-avatar" class="flex h-9 w-9 items-center justify-center rounded-xl bg-primary/20 text-sm font-black text-primary">
                  A
                </div>
                <div class="flex flex-col">
                  <div id="admin-username" class="text-sm font-bold text-ink/90">管理员</div>
                  <div class="text-[11px] font-bold text-muted/80">已登录</div>
                </div>
              </div>
              <button
                id="admin-logout-btn"
                class="flex h-9 w-9 items-center justify-center rounded-xl border border-line bg-panel2/60 text-ink/70 hover:text-ink"
                type="button"
                aria-label="登出"
              >
                <span class="material-symbols-outlined text-[20px]">logout</span>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <main class="ml-[280px] min-h-screen px-10 py-8">
        <header class="mb-8 flex items-center justify-between">
          <div class="space-y-1">
            <div class="text-[11px] font-black uppercase tracking-[0.26em] text-muted/70">先疯管理</div>
            <div class="text-3xl font-black tracking-tight">数据概览</div>
          </div>
          <div class="flex items-center gap-3">
            <div class="theme-toggle flex overflow-hidden rounded-2xl border border-line bg-panel2/60">
              <button id="theme-dark-btn" type="button" class="flex h-11 w-11 items-center justify-center border-r border-line text-ink/70 hover:text-ink" aria-label="深色模式">
                <span class="material-symbols-outlined text-[20px]">dark_mode</span>
              </button>
              <button id="theme-light-btn" type="button" class="flex h-11 w-11 items-center justify-center text-ink/70 hover:text-ink" aria-label="浅色模式">
                <span class="material-symbols-outlined text-[20px]">light_mode</span>
              </button>
            </div>
            <a
              href="/admin/programs"
              class="rounded-2xl bg-primary px-5 py-3 text-sm font-black text-white shadow-glow hover:opacity-95"
            >
              <span class="material-symbols-outlined mr-2 align-[-4px] text-[20px]">add_circle</span>
              新增内容
            </a>
          </div>
        </header>

        <section class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-4">
          <div class="rounded-3xl border border-line bg-panel2/60 p-6 shadow-glow">
            <div class="flex items-start justify-between">
              <div>
                <div class="text-sm font-bold text-muted/90">总用户数</div>
                <div id="stat-users" class="mt-3 text-4xl font-black tracking-tight">-</div>
              </div>
              <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-primary/20 text-primary">
                <span class="material-symbols-outlined text-[22px]">group</span>
              </div>
            </div>
          </div>
          <div class="rounded-3xl border border-line bg-panel2/60 p-6 shadow-glow">
            <div class="flex items-start justify-between">
              <div>
                <div class="text-sm font-bold text-muted/90">内容总数</div>
                <div id="stat-total" class="mt-3 text-4xl font-black tracking-tight">-</div>
              </div>
              <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-white/10 text-ink/80">
                <span class="material-symbols-outlined text-[22px]">inventory_2</span>
              </div>
            </div>
          </div>
          <div class="rounded-3xl border border-line bg-panel2/60 p-6 shadow-glow">
            <div class="flex items-start justify-between">
              <div>
                <div class="text-sm font-bold text-muted/90">已发布</div>
                <div id="stat-published" class="mt-3 text-4xl font-black tracking-tight">-</div>
              </div>
              <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-emerald-500/15 text-emerald-300">
                <span class="material-symbols-outlined text-[22px]">task_alt</span>
              </div>
            </div>
          </div>
          <div class="rounded-3xl border border-line bg-panel2/60 p-6 shadow-glow">
            <div class="flex items-start justify-between">
              <div>
                <div class="text-sm font-bold text-muted/90">草稿箱</div>
                <div id="stat-draft" class="mt-3 text-4xl font-black tracking-tight">-</div>
              </div>
              <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-amber-500/15 text-amber-300">
                <span class="material-symbols-outlined text-[22px]">draft</span>
              </div>
            </div>
          </div>
        </section>

        <section class="mt-6 grid grid-cols-1 gap-6 xl:grid-cols-3">
          <div class="rounded-3xl border border-line bg-panel2/60 p-7 shadow-glow xl:col-span-2">
            <div class="mb-6 flex items-center justify-between">
              <div class="text-lg font-black tracking-tight">近 7 天内容变化</div>
              <div id="chart-meta" class="text-xs font-bold text-muted/80">加载中...</div>
            </div>
            <div class="relative h-[280px] overflow-hidden rounded-3xl border border-line bg-panel/60">
              <div class="absolute inset-0 bg-gradient-to-b from-primary/10 via-transparent to-transparent"></div>
              <svg class="absolute inset-0 h-full w-full" viewBox="0 0 800 280" preserveAspectRatio="none">
                <path
                  id="chart-line"
                  d="M 0 220 C 120 200, 180 130, 260 160 C 360 200, 420 220, 520 180 C 650 120, 700 140, 800 110"
                  fill="none"
                  stroke="rgba(94,23,235,0.9)"
                  stroke-width="4"
                ></path>
                <path
                  id="chart-fill"
                  d="M 0 220 C 120 200, 180 130, 260 160 C 360 200, 420 220, 520 180 C 650 120, 700 140, 800 110 L 800 280 L 0 280 Z"
                  fill="rgba(94,23,235,0.12)"
                ></path>
              </svg>
              <div class="absolute inset-x-0 bottom-0 flex justify-between px-6 py-4 text-[11px] font-bold text-muted/70">
                <div id="chart-labels" class="flex w-full justify-between"></div>
              </div>
            </div>
          </div>

          <div class="rounded-3xl border border-line bg-panel2/60 p-7 shadow-glow">
            <div class="mb-5 text-lg font-black tracking-tight">系统状态</div>
            <div class="space-y-4">
              <div class="flex items-center justify-between rounded-2xl border border-line bg-panel/60 px-5 py-4">
                <div class="flex items-center gap-3">
                  <span class="material-symbols-outlined text-[20px] text-ink/70">dns</span>
                  <div>
                    <div class="text-sm font-bold">MongoDB</div>
                    <div id="mongo-meta" class="text-[11px] font-bold text-muted/80">-</div>
                  </div>
                </div>
                <span id="mongo-badge" class="rounded-full bg-amber-500/15 px-3 py-1 text-[11px] font-black text-amber-300">检测中</span>
              </div>
              <div class="flex items-center justify-between rounded-2xl border border-line bg-panel/60 px-5 py-4">
                <div class="flex items-center gap-3">
                  <span class="material-symbols-outlined text-[20px] text-ink/70">bolt</span>
                  <div>
                    <div class="text-sm font-bold">服务运行</div>
                    <div id="uptime-meta" class="text-[11px] font-bold text-muted/80">-</div>
                  </div>
                </div>
                <span class="rounded-full bg-emerald-500/15 px-3 py-1 text-[11px] font-black text-emerald-300">运行中</span>
              </div>
              <a
                href="/admin/system"
                class="block rounded-2xl border border-line bg-panel/60 px-5 py-4 text-sm font-black text-ink/80 hover:bg-white/5"
              >
                查看系统信息
                <span class="material-symbols-outlined float-right text-[20px] text-ink/60">arrow_forward</span>
              </a>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      (function () {
        function isEmbedded() {
          try {
            return window.self !== window.top;
          } catch (_e) {
            return true;
          }
        }

        function requestNavigate(path) {
          try {
            window.parent.postMessage({ type: "admin:navigate", path: path }, window.location.origin);
          } catch (_e) {}
        }

        function requestSwitch(key) {
          try {
            window.parent.postMessage({ type: "admin:switch", key: key }, window.location.origin);
          } catch (_e) {}
        }

        const token = localStorage.getItem("token");
        if (!token) {
          if (isEmbedded()) {
            requestNavigate("/admin/login");
            return;
          }
          window.location.href = "/admin/login";
          return;
        }

        function applyTheme(theme) {
          const normalized = theme === "light" ? "light" : "dark";
          document.documentElement.dataset.theme = normalized;
          if (normalized === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
          const darkBtn = document.getElementById("theme-dark-btn");
          const lightBtn = document.getElementById("theme-light-btn");
          if (darkBtn) darkBtn.setAttribute("data-active", normalized === "dark" ? "true" : "false");
          if (lightBtn) lightBtn.setAttribute("data-active", normalized === "light" ? "true" : "false");
        }

        const savedTheme = localStorage.getItem("adminTheme") || "dark";
        applyTheme(savedTheme);
        const darkBtn = document.getElementById("theme-dark-btn");
        const lightBtn = document.getElementById("theme-light-btn");
        if (darkBtn) {
          darkBtn.addEventListener("click", function () {
            localStorage.setItem("adminTheme", "dark");
            applyTheme("dark");
          });
        }
        if (lightBtn) {
          lightBtn.addEventListener("click", function () {
            localStorage.setItem("adminTheme", "light");
            applyTheme("light");
          });
        }

        const userRaw = localStorage.getItem("user");
        const user = userRaw ? JSON.parse(userRaw) : null;
        const username = (user && (user.username || user.name)) || "管理员";
        const avatarEl = document.getElementById("admin-avatar");
        const usernameEl = document.getElementById("admin-username");
        if (usernameEl) usernameEl.textContent = username;
        if (avatarEl) avatarEl.textContent = String(username || "A").slice(0, 1).toUpperCase();

        const logoutBtn = document.getElementById("admin-logout-btn");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", function () {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            if (isEmbedded()) {
              requestNavigate("/admin/login");
              return;
            }
            window.location.href = "/admin/login";
          });
        }

        document.addEventListener(
          "click",
          function (event) {
            const target = event.target;
            const link = target && target.closest ? target.closest('a[href^="/admin"]') : null;
            if (!link) return;
            if (!isEmbedded()) return;
            const href = link.getAttribute("href");
            if (!href) return;
            event.preventDefault();
            if (href === "/admin/login") {
              requestNavigate(href);
              return;
            }
            const map = {
              "/admin": "dashboard",
              "/admin/": "dashboard",
              "/admin/programs": "programs",
              "/admin/books": "books",
              "/admin/materials": "materials",
              "/admin/users": "users",
              "/admin/system": "system",
            };
            const key = map[href];
            if (key) requestSwitch(key);
          },
          true
        );

        const currentPath = window.location.pathname || "/admin";
        const map = {
          "/admin": "dashboard",
          "/admin/": "dashboard",
          "/admin/programs": "programs",
          "/admin/books": "books",
          "/admin/materials": "materials",
          "/admin/users": "users",
          "/admin/system": "system",
          "/screens/admin-dashboard.html": "dashboard",
          "/screens/admin-programs.html": "programs",
          "/screens/admin-books.html": "books",
          "/screens/admin-materials.html": "materials",
          "/screens/admin-users.html": "users",
          "/screens/admin-system.html": "system",
        };
        const activeKey = map[currentPath] || "dashboard";
        const activeLink = document.querySelector('[data-nav="' + activeKey + '"]');
        if (activeLink) {
          activeLink.classList.add("bg-white/5");
          activeLink.classList.add("ring-1");
          activeLink.classList.add("ring-white/10");
        }

        function authHeaders() {
          return {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          };
        }

        function fmtUptime(sec) {
          const s = Math.max(0, Number(sec) || 0);
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          return h + "h " + m + "m";
        }

        const statUsers = document.getElementById("stat-users");
        const statTotal = document.getElementById("stat-total");
        const statPublished = document.getElementById("stat-published");
        const statDraft = document.getElementById("stat-draft");
        const mongoMeta = document.getElementById("mongo-meta");
        const mongoBadge = document.getElementById("mongo-badge");
        const uptimeMeta = document.getElementById("uptime-meta");
        const chartMeta = document.getElementById("chart-meta");

        async function loadSystemInfo() {
          const response = await fetch("/api/admin/system-info", { headers: authHeaders() });
          if (!response.ok) throw new Error("系统信息加载失败");
          return await response.json();
        }

        async function loadPrograms() {
          const response = await fetch("/api/admin/programs", { headers: authHeaders() });
          if (!response.ok) throw new Error("节目加载失败");
          return await response.json();
        }

        function buildSeries(programs) {
          const now = new Date();
          const days = [];
          for (let i = 6; i >= 0; i -= 1) {
            const d = new Date(now);
            d.setDate(now.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            days.push({ key, label: String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"), count: 0 });
          }
          const map = {};
          days.forEach((d) => (map[d.key] = d));
          (Array.isArray(programs) ? programs : []).forEach((p) => {
            const createdAt = p && p.createdAt ? new Date(p.createdAt) : null;
            if (!createdAt || Number.isNaN(createdAt.getTime())) return;
            const key = createdAt.toISOString().slice(0, 10);
            if (map[key]) map[key].count += 1;
          });
          return days;
        }

        function setChart(days) {
          const counts = days.map((d) => d.count);
          const max = Math.max(1, ...counts);
          const points = days.map((d, i) => {
            const x = (800 / 6) * i;
            const y = 240 - (d.count / max) * 170;
            return { x, y };
          });
          function pathFrom(points) {
            if (!points.length) return "";
            let d = "M " + points[0].x + " " + points[0].y;
            for (let i = 1; i < points.length; i += 1) {
              const prev = points[i - 1];
              const cur = points[i];
              const cx = (prev.x + cur.x) / 2;
              d += " C " + cx + " " + prev.y + ", " + cx + " " + cur.y + ", " + cur.x + " " + cur.y;
            }
            return d;
          }
          const line = document.getElementById("chart-line");
          const fill = document.getElementById("chart-fill");
          const d = pathFrom(points);
          if (line) line.setAttribute("d", d);
          if (fill) fill.setAttribute("d", d + " L 800 280 L 0 280 Z");
          const labels = document.getElementById("chart-labels");
          if (labels) {
            labels.innerHTML = days.map((item) => '<span>' + item.label + "</span>").join("");
          }
          const total = counts.reduce((sum, n) => sum + n, 0);
          if (chartMeta) chartMeta.textContent = "近 7 天新增 " + total + " 条（按创建时间）";
        }

        async function init() {
          try {
            const info = await loadSystemInfo();
            const stats = (info && info.stats) || {};
            const total = Number(stats.programs || 0) + Number(stats.books || 0) + Number(stats.materials || 0);

            if (statUsers) statUsers.textContent = String(stats.users ?? "-");
            if (statTotal) statTotal.textContent = String(total);

            const programs = await loadPrograms();
            const published = (Array.isArray(programs) ? programs : []).filter((p) => p && p.status === "published").length;
            const draft = (Array.isArray(programs) ? programs : []).filter((p) => p && p.status === "draft").length;
            if (statPublished) statPublished.textContent = String(published);
            if (statDraft) statDraft.textContent = String(draft);

            const mongo = (info && info.mongo) || {};
            const readyState = Number(mongo.readyState);
            if (mongoMeta) mongoMeta.textContent = "readyState=" + String(readyState) + (mongo.name ? " / " + mongo.name : "");
            if (mongoBadge) {
              if (readyState === 1) {
                mongoBadge.textContent = "已连接";
                mongoBadge.className = "rounded-full bg-emerald-500/15 px-3 py-1 text-[11px] font-black text-emerald-300";
              } else {
                mongoBadge.textContent = "未连接";
                mongoBadge.className = "rounded-full bg-red-500/15 px-3 py-1 text-[11px] font-black text-red-300";
              }
            }
            if (uptimeMeta) uptimeMeta.textContent = "Uptime " + fmtUptime(info.uptimeSec) + " · Node " + (info.nodeVersion || "");

            setChart(buildSeries(programs));
          } catch (_error) {
            if (chartMeta) chartMeta.textContent = "加载失败（请检查后端服务与登录状态）";
          }
        }

        init();
      })();
    </script>
  </body>
</html>
