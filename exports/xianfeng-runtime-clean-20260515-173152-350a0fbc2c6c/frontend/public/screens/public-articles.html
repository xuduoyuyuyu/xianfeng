<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />

    <title>家长先疯 - 精选文稿</title>

  <body class="bg-hub-bg text-on-surface">

          <a href="/programs">
            <img alt="家长先疯" class="nav-logo" src="/assets/logo.png" />
          </a>
          <div class="hidden items-center gap-8 xl:flex">
            <div class="flex gap-8 border-r border-outline-light pr-8">
              <a class="nav-link" href="/programs">播客节目</a>
              <a class="nav-link" href="/community">学习社区</a>
            </div>
            <div class="flex gap-6">
              <a class="nav-link !text-on-surface font-bold relative after:absolute after:bottom-[-29px] after:left-0 after:h-1 after:w-full after:bg-primary-purple" href="/articles"><span class="material-symbols-outlined text-lg">article</span>精选文稿</a>

      <header class="mb-10">
        <div class="mb-4 flex items-baseline gap-4">
          <h1 class="text-4xl font-black tracking-tight">精选文稿</h1>
          <div class="h-1.5 w-12 rounded-full bg-primary-purple"></div>
        </div>
        <p class="max-w-2xl text-lg text-on-surface-variant">独立路径：/articles。后续可接入文章/逐字稿精选。</p>

      <section class="magazine-card rounded-3xl p-10">

      </section>
