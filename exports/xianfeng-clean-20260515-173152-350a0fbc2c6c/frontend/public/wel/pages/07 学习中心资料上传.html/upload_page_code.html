<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>教材中心</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f4f8;--surface:#fff;--surface2:#f0eff5;--border:#e8e6f0;
  --text:#1a1825;--text2:#6b6880;--text3:#9d9aac;
  --accent:#7c3aed;--accent2:#a78bfa;--accent-bg:rgba(124,58,237,.07);--accent-border:rgba(124,58,237,.18);
  --green:#059669;--amber:#d97706;--red:#dc2626;
  --r:14px;--shadow:0 2px 16px rgba(0,0,0,.07);--shadow-lg:0 8px 40px rgba(0,0,0,.12);
}
html,body{height:100%;font-family:'DM Sans','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:18px 24px 0;flex-shrink:0}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
.page-sub{font-size:12.5px;color:var(--text2);margin-top:1px}
.btn-upload{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:1px solid var(--accent);padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;box-shadow:0 0 20px rgba(124,58,237,.34)}
.btn-upload:hover{background:#6d28d9;transform:translateY(-1px);box-shadow:0 0 30px rgba(124,58,237,.5)}
.ms{font-family:'Material Symbols Rounded';font-size:18px;font-weight:400;line-height:1;user-select:none}
.tabs{display:flex;gap:2px;border-bottom:1.5px solid var(--border);padding:0 24px}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s;font-family:inherit}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.content{flex:1;overflow-y:auto;padding:20px 24px 32px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:300px;gap:12px;color:var(--text2)}
.empty-icon{width:72px;height:72px;background:var(--accent-bg);border-radius:20px;display:flex;align-items:center;justify-content:center}
.empty-icon .ms{font-size:34px;color:var(--accent)}
.empty-title{font-size:16px;font-weight:600;color:var(--text)}
.empty-sub{font-size:13px;color:var(--text2);text-align:center;max-width:260px;line-height:1.6}
.btn-empty{margin-top:8px;display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:1px solid var(--accent);padding:10px 22px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit;box-shadow:0 0 20px rgba(124,58,237,.34)}
.btn-empty:hover{box-shadow:0 0 30px rgba(124,58,237,.5)}
.tb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.tb-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.tb-card:hover{border-color:var(--accent-border);box-shadow:var(--shadow);transform:translateY(-2px)}
.tb-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .18s}
.tb-card:hover::before{opacity:1}
.tb-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.tb-icon{width:42px;height:42px;background:var(--accent-bg);border-radius:10px;display:flex;align-items:center;justify-content:center}
.tb-icon .ms{font-size:22px;color:var(--accent)}
.tb-status{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px}
.status-done{background:#d1fae5;color:#065f46}
.status-pending{background:#f3f4f6;color:#6b7280}
.status-analyzing{background:#fef3c7;color:#92400e}
.status-error{background:#fee2e2;color:#991b1b}
.tb-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.tb-meta{font-size:12px;color:var(--text2)}
.tb-overview{font-size:12.5px;color:var(--text2);margin-top:10px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tb-footer{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tb-nodes{font-size:11.5px;color:var(--text3);display:flex;align-items:center;gap:4px}
.btn-del{width:28px;height:28px;border:none;background:none;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);transition:all .12s}
.btn-del:hover{background:#fee2e2;color:var(--red)}
.modal-bg{position:fixed;inset:0;background:rgba(10,8,20,.45);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:520px;box-shadow:var(--shadow-lg);transform:translateY(16px) scale(.97);transition:transform .22s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
.modal-bg.show .modal{transform:none}
.modal-hd{padding:24px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-sub{font-size:12px;color:var(--text2);margin-top:2px}
.btn-x{width:32px;height:32px;border:none;background:var(--surface2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .12s;font-family:inherit}
.modal-bd{padding:20px 24px;position:relative}
.modal-ft{padding:16px 24px 20px;display:flex;gap:10px;border-top:1px solid var(--border)}
label.lbl{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);transition:border-color .15s;resize:none;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
textarea{min-height:140px;line-height:1.6}
.row{margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.drop{border:2px dashed var(--accent-border);border-radius:12px;background:var(--accent-bg);padding:22px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px}
.drop:hover,.drop.dg{border-color:var(--accent);background:rgba(124,58,237,.12)}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.ex-pill{display:flex;align-items:center;gap:10px;padding:12px 15px;background:var(--accent-bg);border:1.5px solid var(--accent-border);border-radius:11px;cursor:pointer;transition:all .15s;margin-bottom:14px}
.ex-pill:hover{background:rgba(124,58,237,.12)}
.ex-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-cancel{flex:1;padding:11px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-ok{flex:2;padding:11px;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:999px;font-size:13.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;transition:all .15s;box-shadow:0 0 20px rgba(124,58,237,.34)}
.btn-ok:hover:not(:disabled){background:#6d28d9;box-shadow:0 0 30px rgba(124,58,237,.5);transform:translateY(-1px)}
.btn-ok:disabled{opacity:.6;cursor:not-allowed}
.ov-loading{display:none;position:absolute;inset:0;background:rgba(255,255,255,.9);border-radius:0 0 20px 20px;align-items:center;justify-content:center;flex-direction:column;gap:10px;font-size:13px;font-weight:600;color:var(--accent);z-index:10}
.ov-loading.show{display:flex}
.spin{border:3px solid var(--accent-bg);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
.detail-back{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;padding:0;margin-bottom:18px;font-family:inherit}
.detail-back:hover{color:var(--accent)}
.hero{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.hero-icon{width:52px;height:52px;background:var(--accent-bg);border-radius:13px;display:flex;align-items:center;justify-content:center}
.hero-icon .ms{font-size:26px;color:var(--accent)}
.hero-title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.hero-meta{font-size:12.5px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:8px}
.overview{font-size:13.5px;color:var(--text);line-height:1.7;padding:14px;background:var(--accent-bg);border-radius:10px;border-left:3px solid var(--accent)}
.sec-lbl{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;margin-top:6px;display:flex;align-items:center;gap:7px}
.sec-lbl .ms{font-size:16px;color:var(--accent)}
.ch-block{margin-bottom:18px}
.ch-name{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.nodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.node{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px}
.node:hover{border-color:var(--accent-border)}
.node-name{font-size:13px;font-weight:600;margin-bottom:4px}
.node-desc{font-size:11.5px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.diff{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;display:inline-block}
.de{background:#d1fae5;color:#065f46}
.dm{background:#fef3c7;color:#92400e}
.dh{background:#fee2e2;color:#991b1b}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#1a1825;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok::before{content:'✓  ';color:#34d399}
#toast.err::before{content:'✕  ';color:#f87171}
#toast.info::before{content:'◎  ';color:#a78bfa}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade{animation:fi .18s ease}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="page-title">我的教材</div>
        <div class="page-sub">上传教材，AI 自动提取章节与知识点</div>
      </div>
      <button class="btn-upload" id="btnOpen"><span class="ms">upload_file</span>上传教材</button>
    </div>
    <div class="tabs">
      <button class="tab on" data-tab="all">全部教材</button>
      <button class="tab" data-tab="done">已分析</button>
    </div>
  </div>
  <div class="content" id="content">
    <div id="list"></div>
    <div id="detail" style="display:none"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-hd">
      <div>
        <div class="modal-title">📚 上传教材 · AI 知识解析</div>
        <div class="modal-sub">粘贴教材内容，AI 将自动识别知识点并构建知识图谱</div>
      </div>
      <button class="btn-x" id="btnX"><span class="ms" style="font-size:16px">close</span></button>
    </div>
    <div class="modal-bd">
      <div class="ov-loading" id="ovLoad"><div class="spin" style="width:28px;height:28px"></div><span id="loadTxt">AI 分析中…</span></div>
      <div class="drop" id="drop">
        <span class="ms" style="font-size:30px;color:var(--accent);display:block;margin-bottom:6px">upload_file</span>
        <div style="font-size:13px;font-weight:600;margin-bottom:3px">拖拽文件到此处</div>
        <div style="font-size:11.5px;color:var(--text2)">支持 .txt .md 格式</div>
      </div>
      <div class="divider">或粘贴文本内容</div>
      <div class="row">
        <textarea id="txtContent" placeholder="将教材内容粘贴到这里，AI 将自动识别知识点，构建知识图谱…"></textarea>
      </div>
      <div class="ex-pill" id="btnEx">
        <div class="ex-icon"><span class="ms" style="color:#fff;font-size:17px">science</span></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">使用内置示例：初中物理 · 力学</div>
          <div style="font-size:11.5px;color:var(--text2)">包含牛顿定律、运动学、功与能等核心知识点</div>
        </div>
        <span class="ms" style="color:var(--accent2)">chevron_right</span>
      </div>
      <div class="fg">
        <div class="row"><label class="lbl">教材标题</label><input type="text" id="txtTitle" placeholder="例：初中物理上册"/></div>
        <div class="row"><label class="lbl">学科</label>
          <select id="selSubject">
            <option>物理</option><option>数学</option><option>化学</option>
            <option>语文</option><option>英语</option><option>生物</option>
            <option>历史</option><option>地理</option><option>综合</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" id="btnCancel">取消</button>
      <button class="btn-ok" id="btnOk"><span class="ms">auto_awesome</span>开始 AI 解析</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
const DEMO = `第一章 力学基础

1.1 牛顿第一定律（惯性定律）
物体在没有受到外力作用时，总保持静止状态或匀速直线运动状态。
惯性是物体的固有属性，质量越大惯性越大。

1.2 牛顿第二定律
合外力等于质量乘以加速度：F = ma
加速度方向与合外力方向相同，单位：N = kg·m/s²

1.3 牛顿第三定律
作用力与反作用力大小相等、方向相反、在同一直线上，作用在不同物体上。

第二章 运动学

2.1 基本概念
位移：从初位置到末位置的有向线段（矢量）
速度：位移与时间之比 v = Δx/Δt（矢量）
加速度：速度变化量与时间之比 a = Δv/Δt

2.2 匀变速直线运动公式
v = v₀ + at
s = v₀t + ½at²
v² = v₀² + 2as

第三章 功与能

3.1 功的定义
W = Fs·cosθ，力与位移方向相同做正功，垂直不做功。

3.2 动能定理
合外力做的功等于动能变化：W合 = ΔEk = ½mv² - ½mv₀²

3.3 机械能守恒定律
只有重力做功时机械能守恒：Ek₁ + Ep₁ = Ek₂ + Ep₂`;

let books=[], curTab='all', curId=null;

function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='',3000);
}
async function api(method,path,body){
  const w=window.__ZHI2;
  if(w&&w.api) return w.api(method,path,body);
  const tok=localStorage.getItem('wel_tok')||'';
  const opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(path,opts);
  const d=await r.json();
  if(!r.ok) throw new Error(d.error||'请求失败');
  return d;
}
async function loadList(){
  try{const d=await api('GET','/api/textbooks'); books=d.textbooks||[]; render();}
  catch(e){document.getElementById('list').innerHTML='<div class="empty"><div class="empty-icon"><span class="ms">error</span></div><div class="empty-title">加载失败</div><div class="empty-sub">'+e.message+'</div></div>';}
}
const statusMap={done:['status-done','✓ 已分析'],analyzing:['status-analyzing','分析中…'],pending:['status-pending','待分析'],error:['status-error','分析失败']};
function render(){
  document.getElementById('detail').style.display='none';
  document.getElementById('list').style.display='';
  const list=curTab==='done'?books.filter(b=>b.status==='done'):books;
  if(!list.length){
    document.getElementById('list').innerHTML='<div class="empty"><div class="empty-icon"><span class="ms">menu_book</span></div><div class="empty-title">'+(curTab==='done'?'暂无已分析的教材':'还没有教材')+'</div><div class="empty-sub">上传第一本教材，AI 将自动提取章节和知识点</div><button class="btn-empty" onclick="openModal()"><span class="ms" style="font-size:17px">upload_file</span>上传教材</button></div>';
    return;
  }
  document.getElementById('list').innerHTML='<div class="tb-grid fade">'+list.map(b=>{
    const [cls,lbl]=statusMap[b.status]||['status-pending','未知'];
    return '<div class="tb-card" onclick="showDetail('+b.id+')">'
      +'<div class="tb-card-top"><div class="tb-icon"><span class="ms">menu_book</span></div><span class="tb-status '+cls+'">'+lbl+'</span></div>'
      +'<div class="tb-title">'+b.title+'</div>'
      +'<div class="tb-meta">'+(b.subject||'综合')+' · '+(b.created_at||'').slice(0,10)+'</div>'
      +(b.overview?'<div class="tb-overview">'+b.overview+'</div>':'')
      +'<div class="tb-footer"><div class="tb-nodes"><span class="ms" style="font-size:13px">hub</span>'+(b.status==='done'?'查看知识点':'点击查看')+'</div>'
      +'<button class="btn-del" onclick="delBook(event,'+b.id+')"><span class="ms" style="font-size:16px">delete_outline</span></button></div></div>';
  }).join('')+'</div>';
}
async function showDetail(id){
  curId=id;
  document.getElementById('list').style.display='none';
  const det=document.getElementById('detail');
  det.style.display=''; det.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:200px"><div class="spin" style="width:28px;height:28px"></div></div>';
  try{
    const d=await api('GET','/api/textbooks/'+id);
    const tb=d.textbook, nodes=d.nodes||[];
    const chs={};
    nodes.forEach(n=>{const c=n.chapter||'其他';if(!chs[c])chs[c]=[];chs[c].push(n);});
    const dm={easy:['de','基础'],medium:['dm','中等'],hard:['dh','进阶']};
    const [sc,sl]=statusMap[tb.status]||['status-pending','未知'];
    det.innerHTML='<div class="fade">'
      +'<button class="detail-back" onclick="goBack()"><span class="ms">arrow_back</span>返回教材列表</button>'
      +'<div class="hero"><div class="hero-top"><div class="hero-icon"><span class="ms">menu_book</span></div><div>'
      +'<div class="hero-title">'+tb.title+'</div>'
      +'<div class="hero-meta"><span>'+(tb.subject||'综合')+'</span><span>·</span><span>'+(tb.created_at||'').slice(0,10)+'</span><span>·</span><span class="tb-status '+sc+'" style="font-size:11px">'+sl+'</span></div>'
      +'</div></div>'
      +(tb.overview?'<div class="overview">'+tb.overview+'</div>':'')
      +(tb.status!=='done'?'<button onclick="analyzeBook('+tb.id+')" style="margin-top:14px;display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:1px solid var(--accent);padding:9px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 0 20px rgba(124,58,237,.34)"><span class="ms" style="font-size:17px">auto_awesome</span>开始 AI 分析</button>':'')
      +'</div>'
      +(nodes.length?'<div class="sec-lbl"><span class="ms">hub</span>知识节点（共 '+nodes.length+' 个）</div>'
        +Object.entries(chs).map(([ch,kps])=>'<div class="ch-block"><div class="ch-name"><span class="ms" style="font-size:14px">segment</span>'+ch+'</div><div class="nodes-grid">'+kps.map(n=>{const[dc,dl]=dm[n.difficulty]||['dm','中等'];return '<div class="node"><div class="node-name">'+n.name+'</div><div class="node-desc">'+(n.description||'')+'</div><span class="diff '+dc+'">'+dl+'</span></div>';}).join('')+'</div></div>').join('')
        :'<div class="empty" style="min-height:180px"><div class="empty-icon"><span class="ms">hub</span></div><div class="empty-title">暂无知识节点</div><div class="empty-sub">点击「开始 AI 分析」提取知识点</div></div>')
      +'</div>';
  }catch(e){det.innerHTML='<div class="empty"><div class="empty-title">加载失败</div><div class="empty-sub">'+e.message+'</div></div>';}
}
function goBack(){curId=null;document.getElementById('list').style.display='';document.getElementById('detail').style.display='none';loadList();}
async function analyzeBook(id){
  const btn=document.querySelector('[onclick*="analyzeBook"]');
  if(btn){btn.innerHTML='<div class="spinner"></div>AI 分析中…';btn.disabled=true;}
  try{
    const r=await api('POST','/api/textbooks/'+id+'/analyze',{});
    toast('分析完成！提取了 '+r.nodes+' 个知识点 ✨');
    if(window.__ZHI2&&window.__ZHI2.xpPop)window.__ZHI2.xpPop(50);
    showDetail(id);
  }catch(e){toast(e.message,'err');if(btn){btn.innerHTML='<span class="ms">auto_awesome</span>开始 AI 分析';btn.disabled=false;}}
}
async function delBook(e,id){
  e.stopPropagation();
  if(!confirm('确定要删除这本教材吗？'))return;
  try{await api('POST','/api/textbooks/'+id+'/delete',{});toast('已删除');loadList();}
  catch(err){toast(err.message,'err');}
}
function openModal(){document.getElementById('modal').classList.add('show');}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('ovLoad').classList.remove('show');
  const btn=document.getElementById('btnOk');
  btn.disabled=false;btn.innerHTML='<span class="ms">auto_awesome</span>开始 AI 解析';
}
document.getElementById('btnOpen').onclick=openModal;
document.getElementById('btnX').onclick=closeModal;
document.getElementById('btnCancel').onclick=closeModal;
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('btnEx').onclick=()=>{
  document.getElementById('txtContent').value=DEMO;
  document.getElementById('txtTitle').value='初中物理 · 力学';
  document.getElementById('selSubject').value='物理';
  toast('已填入示例内容','info');
};
const drop=document.getElementById('drop');
drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('dg');});
drop.addEventListener('dragleave',()=>drop.classList.remove('dg'));
drop.addEventListener('drop',e=>{
  e.preventDefault();drop.classList.remove('dg');
  const f=e.dataTransfer.files[0];if(!f)return;
  if(f.name.match(/\.(txt|md)$/i)){
    const r=new FileReader();
    r.onload=ev=>{document.getElementById('txtContent').value=ev.target.result;document.getElementById('txtTitle').value=f.name.replace(/\.[^.]+$/,'');toast('文件读取成功');};
    r.readAsText(f);
  }else toast('请上传 .txt 或 .md 文件，PDF 请手动复制内容','info');
});
drop.addEventListener('click',()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='.txt,.md';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('txtContent').value=ev.target.result;document.getElementById('txtTitle').value=f.name.replace(/\.[^.]+$/,'');toast('文件读取成功');};r.readAsText(f);};
  inp.click();
});
document.getElementById('btnOk').onclick=async()=>{
  const content=document.getElementById('txtContent').value.trim();
  const title=document.getElementById('txtTitle').value.trim()||'未命名教材';
  const subject=document.getElementById('selSubject').value;
  if(!content){toast('请粘贴教材内容或使用内置示例','err');return;}
  const btn=document.getElementById('btnOk');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>上传中…';
  document.getElementById('ovLoad').classList.add('show');
  document.getElementById('loadTxt').textContent='上传教材内容…';
  try{
    const r=await api('POST','/api/textbooks',{title,subject,content_text:content});
    document.getElementById('loadTxt').textContent='AI 分析知识点中，请稍候…';
    const ar=await api('POST','/api/textbooks/'+r.id+'/analyze',{});
    closeModal();
    toast('「'+title+'」分析完成，提取了 '+ar.nodes+' 个知识点 ✨');
    if(window.__ZHI2&&window.__ZHI2.xpPop)window.__ZHI2.xpPop(50);
    document.getElementById('txtContent').value='';
    document.getElementById('txtTitle').value='';
    await loadList();
    showDetail(r.id);
  }catch(e){closeModal();toast(e.message||'AI 分析失败，请重试','err');}
};
document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');curTab=t.dataset.tab;render();};});
loadList();
</script>
</body>
</html>
