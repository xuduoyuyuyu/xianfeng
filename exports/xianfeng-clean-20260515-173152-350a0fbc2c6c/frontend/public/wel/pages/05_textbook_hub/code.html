<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>资源中心</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--p:#6c27d6;--pd:rgba(108,39,214,.09);--pg:rgba(108,39,214,.18);--bg:#f4f4f7;--sf:#fff;--brd:rgba(0,0,0,.07);--tx:#111118;--mu:#6b7280;--mu2:#9ca3af}
html,body{height:100%;background:var(--bg);font-family:'DM Sans','Noto Sans SC',sans-serif;font-size:13px;color:var(--tx);-webkit-font-smoothing:antialiased;overflow:hidden}
.ms{font-family:'Material Symbols Rounded';font-variation-settings:'FILL' 1;line-height:1;vertical-align:middle;font-style:normal}
.ms0{font-variation-settings:'FILL' 0}
.page{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hd{flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--brd);padding:16px 24px 0}
.hd-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px}
.hd-title{font-size:18px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
.hd-title .ms{font-size:20px;color:var(--p);background:var(--pd);border-radius:8px;padding:4px}
.hd-sub{font-size:12px;color:var(--mu);margin-top:2px}
.hd-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;background:#7f13ec;color:white;border:1px solid #7f13ec;border-radius:999px;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 0 20px rgba(127,19,236,.34)}
.hd-btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(127,19,236,.5)}
.hd-btn .ms{font-size:15px;color:#fff}
.tabs{display:flex;gap:0}
.tab{display:flex;align-items:center;gap:5px;padding:8px 16px;border:none;background:transparent;font:inherit;font-size:12.5px;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--p);font-weight:600;border-bottom-color:var(--p)}
.tab .ms{font-size:14px;font-variation-settings:'FILL' 0}
.tab.on .ms{font-variation-settings:'FILL' 1}
.tab .badge{background:rgba(108,39,214,.12);color:var(--p);font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px}
.body{flex:1;overflow-y:auto;padding:20px 24px}
.body::-webkit-scrollbar{width:4px}
.body::-webkit-scrollbar-thumb{background:var(--pg);border-radius:4px}
.panel{display:none}
.panel.on{display:block}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px}
.sec-title .ms{font-size:15px;color:var(--p)}
.sec-link{font-size:11.5px;color:var(--p);background:none;border:none;cursor:pointer;font:inherit;display:flex;align-items:center;gap:3px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;margin-bottom:24px}
.kanban-col{background:rgba(0,0,0,.02);border-radius:18px;padding:12px;display:flex;flex-direction:column;gap:12px;min-height:200px}
.kanban-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;padding:0 4px}
.kanban-title{font-size:13px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:6px}
.kanban-count{font-size:10px;font-weight:800;background:var(--pd);color:var(--p);padding:2px 7px;border-radius:10px}
.book-tag-learning {
            position: absolute;
            top: 6px;
            left: 6px;
            background: #f59e0b;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 3px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
          }
          .book-tag-learning::before {
            content: 'school';
            font-family: 'Material Symbols Rounded';
            font-size: 13px;
            font-weight: normal;
            display: block;
            width: auto;
            height: auto;
            background: none;
          }
          .book-card{background:var(--sf);border:1px solid var(--brd);border-radius:12px;padding:10px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:110px}
.book-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(108,39,214,.12);border-color:var(--pg)}
.book-remove-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border:none;border-radius:7px;background:rgba(239,68,68,.92);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:6;opacity:0;pointer-events:none;transform:translateY(-2px);transition:all .16s}
.book-card:hover .book-remove-btn{opacity:1;pointer-events:auto;transform:translateY(0)}
.book-remove-btn:hover{background:#dc2626}
.book-icon{width:36px;height:36px;border-radius:9px;background:var(--pd);display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.book-name{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-hint{font-size:10.5px;color:var(--mu2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.book-progress{height:2.5px;background:#e5e7eb;border-radius:2px;margin-bottom:8px;overflow:hidden}
.book-progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#a855f7);border-radius:2px}
.book-footer{display:flex;align-items:center;justify-content:space-between}
.book-meta{font-size:10px;color:var(--mu2)}
.book-action{font-size:10.5px;font-weight:700;color:var(--p);background:none;border:none;cursor:pointer;font:inherit;display:flex;align-items:center;gap:2px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:10px;text-align:center;background:var(--sf);border:2px dashed var(--brd);border-radius:16px;grid-column:1/-1}
.empty .ms{font-size:36px;color:var(--mu2)}
.empty-title{font-size:13.5px;font-weight:700;color:var(--mu)}
.empty-sub{font-size:12px;color:var(--mu2)}
.empty-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;background:#7f13ec;color:white;border:1px solid #7f13ec;border-radius:999px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .15s;box-shadow:0 0 20px rgba(127,19,236,.34)}
.empty-btn:hover{box-shadow:0 0 30px rgba(127,19,236,.5)}
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:skel .9s ease-in-out infinite;border-radius:6px}
.skel-card{background:var(--sf);border:1px solid var(--brd);border-radius:14px;padding:16px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.official-banner{background:linear-gradient(135deg,#4f1dab 0%,#7c3aed 50%,#9333ea 100%);border-radius:16px;padding:24px;color:white;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;cursor:pointer;transition:all .18s;overflow:hidden;position:relative}
.official-banner::after{content:'';position:absolute;top:-20px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.official-banner::before{content:'';position:absolute;bottom:-30px;right:10px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
.official-banner:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,39,214,.35)}
.ob-title{font-size:17px;font-weight:700;margin-bottom:4px}
.ob-sub{font-size:12px;opacity:.7;margin-bottom:12px}
.ob-tags{display:flex;gap:6px;flex-wrap:wrap}
.ob-tag{background:rgba(255,255,255,.2);border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:600}
.ob-icon{font-size:64px;opacity:.25;position:relative;z-index:1;flex-shrink:0}
.ob-cta{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:white;color:var(--p);border:none;border-radius:8px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-top:12px;transition:all .12s}
.ob-cta:hover{background:#f5f0ff}
.stats-row{display:flex;gap:10px;margin-bottom:20px}
.stat-card{flex:1;background:var(--sf);border:1px solid var(--brd);border-radius:12px;padding:12px 14px}
.stat-card .sv{font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.5px}
.stat-card .sl{font-size:10.5px;color:var(--mu);margin-top:2px;display:flex;align-items:center;gap:3px}
.stat-card .sl .ms{font-size:12px;color:var(--p)}
.upload-box{background:var(--sf);border:2px dashed var(--brd);border-radius:16px;padding:40px;text-align:center;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px}
.upload-box:hover{border-color:var(--p);background:var(--pd)}
.upload-box .ms{font-size:44px;color:var(--mu2);transition:color .15s}
.upload-box:hover .ms{color:var(--p)}
.up-title{font-size:14.5px;font-weight:700;color:var(--tx)}
.up-sub{font-size:12px;color:var(--mu);max-width:360px;line-height:1.5}
.up-btn{display:flex;align-items:center;gap:6px;padding:9px 22px;background:#7f13ec;color:white;border:1px solid #7f13ec;border-radius:999px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 0 20px rgba(127,19,236,.34);transition:all .15s;margin-top:4px}
.up-btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(127,19,236,.5)}
.up-btn .ms{font-size:16px;color:#fff}
.info-box{margin-top:14px;padding:14px 16px;background:var(--sf);border:1px solid var(--brd);border-radius:12px}
.info-box-title{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.info-box-title .ms{font-size:14px;color:var(--p)}
.info-box-body{font-size:11.5px;color:var(--mu);line-height:1.8}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .2s ease forwards}
.filter-bar{display:flex;gap:10px;margin-bottom:20px;padding:4px;background:var(--sf);border:1px solid var(--brd);border-radius:12px;width:fit-content}
.filter-sel{padding:8px 12px;border:none;background:transparent;font-size:12.5px;font-weight:600;color:var(--mu);cursor:pointer;outline:none;border-right:1px solid var(--brd)}
.filter-sel:last-child{border-right:none}
.filter-sel:hover{color:var(--p)}
.filter-sel option{background:white;color:var(--tx)}
/* Preview Modal */
.preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;display:none;opacity:0;transition:opacity .2s}
.preview-overlay.show{display:flex;opacity:1}
.preview-modal{width:90%;height:90%;margin:auto;background:var(--sf);border-radius:16px;box-shadow:0 24px 48px rgba(0,0,0,.2);display:flex;flex-direction:column;overflow:hidden;transform:scale(.95);transition:transform .2s}
.preview-overlay.show .preview-modal{transform:scale(1)}
.pm-hd{padding:16px 24px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;background:white}
.pm-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.pm-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pm-close:hover{background:#fee2e2;color:#ef4444}
.pm-body{flex:1;display:flex;overflow:hidden}
.pm-viewer{flex:1;background:#e5e7eb;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pm-viewer iframe{width:100%;height:100%;border:none}
.pm-viewer img{max-width:100%;max-height:100%;object-fit:contain}
.pm-sidebar{width:300px;background:white;border-left:1px solid var(--brd);display:flex;flex-direction:column}
.pms-hd{padding:16px;border-bottom:1px solid var(--brd);font-weight:700;display:flex;align-items:center;gap:6px;flex-shrink:0}
.pms-chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.pms-chat-area::-webkit-scrollbar{width:4px}
.pms-chat-area::-webkit-scrollbar-thumb{background:var(--pg);border-radius:4px}
.pms-input-area{padding:12px 16px;border-top:1px solid var(--brd);display:flex;gap:8px;background:white;flex-shrink:0}
.pms-input-area input{flex:1;border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
.pms-input-area input:focus{border-color:var(--p)}
.pms-send-btn{width:36px;height:36px;border-radius:8px;background:var(--p);color:white;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.pms-send-btn:hover{background:#5b21b6}
.pms-send-btn .ms{font-size:18px}
.ai-msg{align-self:flex-start;max-width:92%}
.ai-msg-content{background:var(--pd);color:var(--tx);padding:10px 14px;border-radius:12px;border-top-left-radius:2px;font-size:13px;line-height:1.5}
.user-msg{align-self:flex-end;max-width:92%}
.user-msg-content{background:var(--p);color:white;padding:10px 14px;border-radius:12px;border-bottom-right-radius:2px;font-size:13px;line-height:1.5}
.ai-bubble{background:var(--pd);border-radius:12px;padding:12px;font-size:12.5px;line-height:1.6;color:var(--tx)}
.ai-bubble-title{font-weight:700;color:var(--p);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.ai-quiz-card{background:white;border:1px solid var(--brd);border-radius:12px;padding:12px;margin-top:8px}
.book-cover-img { transition: transform 0.5s ease; }
.book-card:hover .book-cover-img { transform: scale(1.08); }
</style>
</head>
<body>
<div class="page">
  <div class="hd">
    <div class="hd-top" style="align-items:center">
      <div>
        <div class="hd-title"><span class="ms">menu_book</span>资源中心</div>
        <div class="hd-sub">管理你的学习资源，AI 自动提取知识节点</div>
      </div>

          </select>

            <option value="全部">全部版本</option>
            <option>人教版</option><option>北师大版</option><option>苏教版</option><option>沪教版</option><option>鲁教版</option>
          </select>
          <select class="filter-sel" id="f-subject" onchange="renderOfficial()">
            <option value="全部">全部学科</option>

  </div>

  <div class="body">
    <!-- 我的文件 -->

<script>
function getZ() { return window.__ZHI2 || (window.parent && window.parent.__ZHI2); }

function sanitizeOverviewText(raw) {
  const text = String(raw || '')
    .replace(/\r/g, '\n')
    .replace(/URL:\s*\/uploads\/\S+/gi, '')
    .replace(/https?:\/\/\S+/gi, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  if (!text) return '';
  const lines = text
    .split('\n')
    .map(x => x.trim())
    .filter(Boolean)
    .filter(x => !/^[.\-_=~·•…\s\d]{8,}$/.test(x))
    .filter(x => !/^\d+\s*[\.\-、]/.test(x));
  return lines.join(' ').replace(/\s{2,}/g, ' ').trim();
}

function looksLikeNoisyOverview(text) {
  const t = sanitizeOverviewText(text);
  if (!t) return true;
  if (t.includes('正在解析')) return true;
  if (/([.·…]{5,}|\.{5,})/.test(t)) return true;
  if (/目录|总主编|责任编辑|编写人员|教材目录/.test(t) && t.length > 90) return true;
  const punct = (t.match(/[，。；：！？]/g) || []).length;
  if (t.length > 120 && punct < 2) return true;
  return false;
}

function pickResourceOverview(raw, fallback) {
  const clean = sanitizeOverviewText(raw);
  if (clean && !looksLikeNoisyOverview(clean)) return clean;
  return String(fallback || '').trim();
}

const SUB_COLORS={数学:'#dbeafe:#1d4ed8',物理:'#f3e8ff:#7e22ce',化学:'#dcfce7:#15803d',语文:'#fee2e2:#b91c1c',英语:'#fef9c3:#a16207',生物:'#ccfbf1:#0f766e',地理:'#ffedd5:#c2410c'};
const SUB_ICONS={
  '数学': 'calculate',
  '物理': 'bolt',
  '化学': 'science',
  '语文': 'auto_stories',
  '英语': 'translate',
  '生物': 'emoji_nature',
  '地理': 'public',
  '历史': 'history_edu',
  '政治': 'gavel',
  '综合': 'category'
};

function getGrade(title) {
    const grades = ['一年级','二年级','三年级','四年级','五年级','六年级','七年级','八年级','九年级','初一','初二','初三','高一','高二','高三'];
    let g = '';
    for (let item of grades) {
        if (title.includes(item)) {
            g = item;
            break;
        }
    }
    
    let s = '';
    if (title.includes('上册')) s = '上册';
    else if (title.includes('下册')) s = '下册';
    else if (title.includes('全册')) s = '全册';
    else if (g && title.includes('上') && !title.includes('上海')) s = '上册';
    else if (g && title.includes('下')) s = '下册';
    
    if (g && s) return g + ' · ' + s;
    if (g) return g;
    return '';
}

async function loadBooks() {
  const Z = getZ();
  if(!Z) {
    setTimeout(loadBooks, 300);
    return;
  }
  try {
    const d = await Z.api('GET','/api/textbooks');
    const rawBooks = d.textbooks||[];
    
    // Deduplicate books by title
    const books = [];
    const seenTitles = new Set();
    rawBooks.forEach(b => {
      if (!seenTitles.has(b.title)) {
        seenTitles.add(b.title);
        books.push(b);
      }
    });

    window._myBooks = books; // Cache for official render
    
    // Ensure the function is globally accessible
    // window.openOfficialBook is defined globally now

    const done = books.filter(b=>b.status==='done').length;

    const kanban = document.getElementById('kanban-view');

      return;
    }

    // Group by subject
    const subjects = {};
    const DEFAULT_SUBJ = '综合';
    
    // Heuristic for subject
    const KEYWORDS = {
      '数学': '数学', '代数': '数学', '几何': '数学',
      '物理': '物理', '力学': '物理', '电学': '物理',
      '化学': '化学', '有机': '化学', '无机': '化学',
      '语文': '语文', '文学': '语文', '古诗': '语文',

      '地理': '地理', '历史': '历史', '政治': '政治'
    };

    books.forEach(b => {

        for (const [k, v] of Object.entries(KEYWORDS)) {
          if (b.title && b.title.includes(k)) {
            s = v;
            break;

async function renderOfficial(){
  const Z = getZ();
  
  // Wait for loadBooks if not loaded
  if (!window._myBooks) {
      await loadBooks();
  }
  
  // Fetch My Files list to check for existence
  let myTitles = new Set();
  let myBookByTitle = new Map();
  let myBookBySourceId = new Map();
  if (Z && window._myBooks) {
    window._myBooks.forEach(b => {
      myTitles.add(b.title);
      if (b && b.title && b.id) myBookByTitle.set(b.title, b.id);
      if (b && b.source_official_id && b.id) myBookBySourceId.set(+b.source_official_id, b.id);
    });
  }

  let apiResources = [];
  let userGradeVal = 0;
  
  try {
    if (Z) {
      const [res, me] = await Promise.all([
        Z.api('GET', '/api/public/resources'),
        Z.api('GET', '/api/me')
      ]);
      
      if (res && res.resources) {
        apiResources = res.resources;
      }
      
      if (me && me.grade) {
        const GRADE_MAP = {
          '一年级':1, '二年级':2, '三年级':3, '四年级':4, '五年级':5, '六年级':6,
          '七年级':7, '初一':7, '八年级':8, '初二':8, '九年级':9, '初三':9,
          '高一':10, '高二':11, '高三':12
        };
        for (const k in GRADE_MAP) {
            if (me.grade.includes(k)) {
                userGradeVal = GRADE_MAP[k];
                break;
            }
        }
      }
    }
  } catch(e) { console.error('Load official failed', e); }
  
  // Dynamic Filter Population
  const fGrade = document.getElementById('f-grade');
  const fVer = document.getElementById('f-version');
  const fSubj = document.getElementById('f-subject');
  
  // Keep selected values if any
  const selG = fGrade.value;
  const selV = fVer.value;
  const selS = fSubj.value;
  
  const grades = new Set();
  const versions = new Set();
  const subjects = new Set();
  
  apiResources.forEach(r => {
      if(r.grade) grades.add(r.grade);
      if(r.version) versions.add(r.version);
      if(r.subject) subjects.add(r.subject);
  });
  
  // Helper to populate select
  const pop = (el, set, def, curr) => {
      // Sort
      const arr = Array.from(set).sort();
      // Keep '全部' option
      const first = el.options[0];
      el.innerHTML = '';
      el.appendChild(first);
      
      arr.forEach(val => {
          if(!val) return;
          const opt = document.createElement('option');
          opt.value = val;
          opt.textContent = val;
          el.appendChild(opt);
      });
      // Restore selection if valid
      if(set.has(curr)) el.value = curr;
      else el.value = def;
  };
  
  // Only populate if not already populated (or always refresh?)
  // Refreshing always ensures sync with data
  pop(fGrade, grades, '全部', selG);
  pop(fVer, versions, '全部', selV);
  pop(fSubj, subjects, '全部', selS);

  const allCards = apiResources.map(r => ({
    id: r.id,
    title: r.title,
    subject: r.subject || '综合',
    grade: r.grade || '通用',
    ver: r.version || '通用',
    official_category: r.official_category || 'featured',

    source_file_url: r.source_file_url || ''
  }));
  
  // Sort Logic
  const GRADE_MAP = {
      '一年级':1, '二年级':2, '三年级':3, '四年级':4, '五年级':5, '六年级':6,
      '七年级':7, '初一':7, '八年级':8, '初二':8, '九年级':9, '初三':9,
      '高一':10, '高二':11, '高三':12
  };
  const getGVal = (t) => {
      for(const k in GRADE_MAP) if(t.includes(k)) return GRADE_MAP[k];
      return 0;

  allCards.sort((a, b) => {
      // Logic:

    // Refresh the books list to update UI with correct categorization
    await loadBooks();
    
    // Remove button and show badge immediately
    const card = btn.closest('.book-card');
    if(card) {
      btn.remove();
      card.insertAdjacentHTML('afterbegin', '<div class="book-tag-learning">学习中</div>');
    }
  } catch(e) {
    Z.toast('添加失败: ' + e.message, 'err');
    btn.disabled = false;
  }
}

async function removeMyFileCard(ev, id, title){
  if(ev){ ev.stopPropagation(); ev.preventDefault(); }
  const Z = getZ();
  if(!Z || !id) return;
  if(!confirm(`确认从「我的文件」移除《${title||'该教材'}》吗？`)) return;
  try{
    Z.toast('正在移除...', 'info');
    await Z.api('POST', `/api/textbooks/${id}/delete`, {});
    Z.toast('已移除', 'success');
    await loadBooks();
    await renderOfficial();
  }catch(e){
    Z.toast('移除失败: ' + e.message, 'err');
  }
}

async function removeFromMineBySource(ev, sourceOfficialId, title){
  if(ev){ ev.stopPropagation(); ev.preventDefault(); }
  const Z = getZ();
  if(!Z) return;
  const books = window._myBooks || [];
  const hit = books.find(b => (+b.source_official_id || 0) === (+sourceOfficialId || 0)) || books.find(b => b.title === title);
  if(!hit || !hit.id){
    Z.toast('未找到对应教材记录', 'err');
    return;
  }
  if(!confirm(`确认从「我的文件」移除《${title}》吗？`)) return;
  try{
    await Z.api('POST', `/api/textbooks/${hit.id}/delete`, {});
    Z.toast('已移除');
    await loadBooks();
    await renderOfficial();
  }catch(e){
    Z.toast('移除失败: ' + e.message, 'err');
  }
}

async function openFilePreview(id, url, title, overview, allowDelete = true) {
  const overlay = document.getElementById('preview-overlay');
  const viewer = document.getElementById('pm-viewer');
  const aiChatArea = document.getElementById('pms-chat-area');
  
  window.currentPreviewId = id; // Store ID for delete
  document.getElementById('pm-filename').textContent = title || '文件预览';

  // Inject Delete Button
  const actions = document.querySelector('.pm-actions');
  if(actions) {
    actions.innerHTML = allowDelete ? `
      <button class="pm-close" onclick="deleteCurrentFile()" style="color:#ef4444;background:#fee2e2" title="删除文件"><span class="ms">delete</span></button>
      <button class="pm-close" onclick="closePreview()"><span class="ms">close</span></button>
    ` : `
      <button class="pm-close" onclick="closePreview()"><span class="ms">close</span></button>
    `;
  }
  
  // Clear previous content
  viewer.innerHTML = '<div class="skel" style="width:100%;height:100%"></div>';
  
  // Determine file type
  const safeUrl = String(url || '').trim();
  const ext = safeUrl ? ((safeUrl.split('.').pop()||'').toLowerCase()) : '';
  if (safeUrl && ['jpg','jpeg','png','gif','webp','bmp'].includes(ext)) {
    viewer.innerHTML = `<img src="${safeUrl}" alt="preview">`;
  } else if (safeUrl) {
    // For PDF, TXT, HTML, etc. use iframe
    viewer.innerHTML = `<iframe src="${safeUrl}"></iframe>`;
  }
  
  // Fetch detailed info (nodes)
  let nodesHtml = '';
  let detailRes = null;
  try {
      const Z = getZ();
      if (Z) {
          const res = await Z.api('GET', `/api/textbooks/${id}`);
          detailRes = res;
          if (res && res.nodes && res.nodes.length > 0) {
              const chapters = {};
              res.nodes.forEach(n => {
                  const ch = n.chapter || '其他';
                  if (!chapters[ch]) chapters[ch] = [];
                  chapters[ch].push(n);
              });
              
              nodesHtml = `<div class="ai-bubble">
                  <div class="ai-bubble-title"><span class="ms">toc</span> 教材结构 (${res.nodes.length}节点)</div>
                  <div style="max-height:200px;overflow-y:auto;font-size:12px">`;
              
              for (const [ch, list] of Object.entries(chapters)) {
                  nodesHtml += `<div style="font-weight:700;margin-top:8px;color:var(--tx)">${ch}</div>`;
                  list.forEach(n => {
                      nodesHtml += `<div style="padding:4px 0;padding-left:10px;border-left:2px solid var(--pd);color:var(--mu)">${n.name}</div>`;
                  });
              }
              nodesHtml += `</div></div>`;
          }
      }
  } catch (e) { console.error(e); }
  if (!safeUrl) {
    const previewText = ((detailRes?.textbook?.content_text || '').trim() || (overview || '').trim() || '暂无可预览正文');
    const safeText = previewText.replace(/</g, '&lt;');
    viewer.innerHTML = `<div style="width:100%;height:100%;overflow:auto;background:#fff;padding:16px;white-space:pre-wrap;word-break:break-word;line-height:1.6;font-size:13px;color:#334155">${safeText}</div>`;
  }

  // Update AI Sidebar
  let aiHtml = '';
  if (overview && overview !== 'undefined' && overview !== 'null') {
    aiHtml += `<div class="ai-bubble">
      <div class="ai-bubble-title"><span class="ms">summarize</span> 内容摘要</div>
      ${overview}
    </div>`;
  } else {
    aiHtml += `<div class="ai-bubble">
      <div class="ai-bubble-title"><span class="ms">auto_awesome</span> 智能分析</div>
      AI 正在提取文件核心知识点，请稍候...
    </div>`;
  }
  
  if (nodesHtml) aiHtml += nodesHtml;

  aiHtml += `<div class="ai-bubble">
      <div class="ai-bubble-title"><span class="ms">lightbulb</span> 学习建议</div>
      根据文件内容，建议重点关注核心概念定义与推导过程。遇到不懂的知识点，可以随时向我提问。
      <div style="margin-top:8px;display:flex;gap:8px">
        <button onclick="explainKeyPoints()" style="flex:1;padding:6px;border:1px solid var(--p);color:var(--p);background:white;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">解释核心概念</button>
        <button onclick="generatePlan(document.getElementById('pm-filename').textContent)" style="flex:1;padding:6px;border:1px solid var(--p);color:white;background:var(--p);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">生成学习方案</button>
      </div>
    </div>
    <div class="ai-quiz-card">
      <div class="ai-bubble-title"><span class="ms">quiz</span> 自测练习</div>
      <button onclick="generateQuiz()" style="width:100%;padding:6px;border:1px solid var(--p);color:var(--p);background:white;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">生成相关练习题</button>
    </div>`;
    
  aiChatArea.innerHTML = aiHtml;

  overlay.classList.add('show');
}

function generateQuiz() {
  const Z = getZ();
  if(Z && Z.toast) Z.toast("正在生成练习题...");
  
  setTimeout(() => {
    const chat = document.getElementById('pms-chat-area');
    const quizId = 'quiz-' + Date.now();
    const card = document.createElement('div');
    card.className = 'ai-quiz-card fade-up';
    card.innerHTML = `
      <div class="ai-bubble-title"><span class="ms">quiz</span> 自测练习</div>
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">以下哪个选项是本章节的核心观点？</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button onclick="checkAnswer(this, false)" style="text-align:left;padding:8px 12px;border:1px solid var(--brd);background:var(--sf);border-radius:8px;cursor:pointer;font-size:12.5px;transition:all .15s">A. 这是一个干扰选项，看似正确其实错误</button>
        <button onclick="checkAnswer(this, true)" style="text-align:left;padding:8px 12px;border:1px solid var(--brd);background:var(--sf);border-radius:8px;cursor:pointer;font-size:12.5px;transition:all .15s">B. 这是一个正确选项，准确描述了核心概念</button>
        <button onclick="checkAnswer(this, false)" style="text-align:left;padding:8px 12px;border:1px solid var(--brd);background:var(--sf);border-radius:8px;cursor:pointer;font-size:12.5px;transition:all .15s">C. 这是一个完全错误的选项</button>
      </div>
      <div style="margin-top:10px;padding-top:8px;border-top:1px dashed var(--brd)">
        <button onclick="toggleAnswer('${quizId}')" style="background:none;border:none;color:var(--mu);cursor:pointer;font-size:11px;display:flex;align-items:center;gap:4px">
          <span class="ms" style="font-size:14px">visibility</span> 显示解析
        </button>
        <div id="${quizId}" style="display:none;margin-top:6px;font-size:12px;color:var(--mu);line-height:1.4">
          <span style="color:var(--p);font-weight:700">解析：</span> 正确答案是 B。本章节重点讲述了该概念的定义与应用，选项 B 最为准确。
        </div>
      </div>
    `;
    chat.appendChild(card);
    chat.scrollTop = chat.scrollHeight;
  }, 1000);
}

function explainKeyPoints() {
  const chat = document.getElementById('pms-chat-area');
  const bubble = document.createElement('div');
  bubble.className = 'ai-bubble fade-up';
  bubble.innerHTML = `
    <div class="ai-bubble-title"><span class="ms">lightbulb</span> 核心概念</div>
    <ul style="padding-left:18px;margin:0;font-size:12.5px;color:var(--tx)">
      <li style="margin-bottom:4px"><b>关键概念一：</b> 知识点的基础定义与核心要素。</li>
      <li style="margin-bottom:4px"><b>关键概念二：</b> 该知识点在实际问题中的应用场景。</li>
      <li><b>总结：</b> 理解这两点对于掌握本章内容至关重要。</li>
    </ul>
  `;
  chat.appendChild(bubble);
  chat.scrollTop = chat.scrollHeight;
}

function checkAnswer(btn, isCorrect) {
  const allBtns = btn.parentElement.querySelectorAll('button');
  allBtns.forEach(b => {
    b.disabled = true;
    b.style.cursor = 'default';
  });
  
  if (isCorrect) {
    btn.style.background = '#dcfce7';
    btn.style.borderColor = '#16a34a';
    btn.style.color = '#15803d';
    btn.innerHTML += ' <span class="ms" style="font-size:14px;vertical-align:middle">check</span>';
  } else {
    btn.style.background = '#fee2e2';
    btn.style.borderColor = '#dc2626';
    btn.style.color = '#b91c1c';
    btn.innerHTML += ' <span class="ms" style="font-size:14px;vertical-align:middle">close</span>';
  }
}

function toggleAnswer(id) {
  const el = document.getElementById(id);
  if (el.style.display === 'none') {
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function sendAiMsg() {
  const input = document.getElementById('ai-input');
  const txt = input.value.trim();
  if(!txt) return;
  
  const chat = document.getElementById('pms-chat-area');
  
  // User Msg
  const uDiv = document.createElement('div');
  uDiv.className = 'user-msg fade-up';
  uDiv.innerHTML = `<div class="user-msg-content">${txt.replace(/</g,'&lt;')}</div>`;
  chat.appendChild(uDiv);
  
  input.value = '';
  chat.scrollTop = chat.scrollHeight;
  
  // Mock AI Reply
  setTimeout(() => {
    const aDiv = document.createElement('div');
    aDiv.className = 'ai-msg fade-up';
    aDiv.innerHTML = `<div class="ai-msg-content">
      <div style="font-weight:700;margin-bottom:4px;font-size:12px;opacity:0.8">AI 助手</div>
      针对“${txt.replace(/</g,'&lt;')}”的问题，建议参考教材第 3 章相关内容。<br>
      需要我为你总结该章节的重点吗？
    </div>`;
    chat.appendChild(aDiv);
    chat.scrollTop = chat.scrollHeight;
  }, 800);
}

function closePreview() {
  document.getElementById('preview-overlay').classList.remove('show');
  setTimeout(() => {
    document.getElementById('pm-viewer').innerHTML = ''; // Clear to stop video/audio if any
  }, 200);
}

async function deleteCurrentFile() {
  const id = window.currentPreviewId;
  if (!id) return;
  
  if(!confirm('确定要删除这个文件吗？\n删除后不可恢复。')) return;
  
  const Z = getZ();
  if(!Z) return;
  
  Z.toast('正在删除...', 'info');
  try {
    await Z.api('POST', `/api/textbooks/${id}/delete`);
    Z.toast('文件已删除', 'success');
    closePreview();
    await loadBooks(); // Refresh list
  } catch(e) {
    Z.toast('删除失败: ' + e.message, 'err');
  }
}

function generatePlan(title) {
  const Z = getZ();
  if(Z) Z.toast('正在为《'+title+'》生成个性化学习方案...', 'info');
  setTimeout(() => {
    if(Z && Z.go) {
      Z.toast('学习方案已生成！正在跳转...', 'success');
      Z.go(34, {title: title});
    }
  }, 1500);
}

function addToPlan(title) {
  const Z = getZ();
  if(Z) Z.toast('已将《'+title+'》加入本周学习计划', 'success');
}

loadBooks();
renderOfficial();
window.onAIParseDone = loadBooks;
</script>
