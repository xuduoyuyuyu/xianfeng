      <!-- Glasses -->
      <circle cx="-10" cy="2" r="8.5" stroke="#5B4DBC" stroke-width="2.5" fill="rgba(107,92,231,0.08)" />
      <circle cx="10" cy="2" r="8.5" stroke="#5B4DBC" stroke-width="2.5" fill="rgba(107,92,231,0.08)" />
      <line x1="-1.5" y1="2" x2="1.5" y2="2" stroke="#5B4DBC" stroke-width="2.5" />
      <line x1="-18.5" y1="2" x2="-24" y2="0" stroke="#5B4DBC" stroke-width="2" />
      <line x1="18.5" y1="2" x2="24" y2="0" stroke="#5B4DBC" stroke-width="2" />
      
      <!-- Eyes -->
