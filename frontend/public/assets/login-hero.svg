    <rect width="480" height="440" fill="url(#bgG)" />
    
    <!-- Big decorative blob circles -->
    <circle cx="400" cy="60" r="80" fill="#EDE6FF" opacity="0.5" />
    <circle cx="80" cy="370" r="90" fill="#EDE6FF" opacity="0.4" />
    <circle cx="430" cy="370" r="50" fill="#F0EAFF" opacity="0.5" />
    <circle cx="60" cy="90" r="45" fill="#F0EAFF" opacity="0.35" />
    
    <!-- Small dots pattern -->
    <circle cx="100" cy="60" r="3" fill="#D0C0F0" opacity="0.5" />
    <circle cx="420" cy="130" r="2.5" fill="#D0C0F0" opacity="0.4" />
    <circle cx="70" cy="210" r="3" fill="#D0C0F0" opacity="0.45" />
    <circle cx="440" cy="280" r="2" fill="#D0C0F0" opacity="0.4" />
    <circle cx="150" cy="50" r="2.5" fill="#D0C0F0" opacity="0.35" />
    <circle cx="370" cy="220" r="3" fill="#D0C0F0" opacity="0.3" />
    
    <!-- ⭐ Stars -->
