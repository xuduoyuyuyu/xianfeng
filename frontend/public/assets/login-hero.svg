      <rect x="-4" y="20" width="8" height="4" rx="2" fill="#FBB040" />
      <line x1="-18" y1="-6" x2="-10" y2="-3" stroke="#FDE598" stroke-width="2" stroke-linecap="round" />
      <line x1="18" y1="-6" x2="10" y2="-3" stroke="#FDE598" stroke-width="2" stroke-linecap="round" />
      <line x1="0" y1="-22" x2="0" y2="-16" stroke="#FDE598" stroke-width="2" stroke-linecap="round" />
