    <circle cx="420" cy="250" r="12" fill="url(#purple1)" opacity="0.2" />
    <rect x="280" y="390" width="14" height="14" rx="3" fill="url(#orangeAccent)" opacity="0.25" transform="rotate(-20 287 397)" />
    
    <!-- City skyline bottom -->
    <g transform="translate(0, 405)" opacity="0.1">
      <rect x="10" y="8" width="35" height="27" rx="2" fill="#6C5CE7" />
      <rect x="55" y="2" width="22" height="33" rx="2" fill="#6C5CE7" />
      <rect x="90" y="12" width="28" height="23" rx="2" fill="#6C5CE7" />
      <rect x="130" y="-2" width="20" height="37" rx="2" fill="#6C5CE7" />
      <rect x="162" y="10" width="38" height="25" rx="2" fill="#6C5CE7" />
      <rect x="215" y="4" width="24" height="31" rx="2" fill="#6C5CE7" />
      <rect x="252" y="12" width="30" height="23" rx="2" fill="#6C5CE7" />
      <rect x="295" y="-1" width="18" height="36" rx="2" fill="#6C5CE7" />
      <rect x="328" y="8" width="34" height="27" rx="2" fill="#6C5CE7" />
      <rect x="375" y="3" width="22" height="32" rx="2" fill="#6C5CE7" />
      <rect x="410" y="10" width="28" height="25" rx="2" fill="#6C5CE7" />
