<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 440" fill="none">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F5FF" />
      <stop offset="100%" stop-color="#FEFDFF" />
    </linearGradient>
    <linearGradient id="purple1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7868E6" />
      <stop offset="100%" stop-color="#9B8CF2" />
    </linearGradient>
    <linearGradient id="purple2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B4DBC" />
      <stop offset="100%" stop-color="#8678E8" />
    </linearGradient>
    <linearGradient id="pinkAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F093B0" />
      <stop offset="100%" stop-color="#F8BAD0" />
    </linearGradient>
    <linearGradient id="yellowAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCC44C" />
      <stop offset="100%" stop-color="#FDE598" />
    </linearGradient>
    <linearGradient id="orangeAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F9995C" />
      <stop offset="100%" stop-color="#FBBF91" />
    </linearGradient>
    <linearGradient id="clothing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C5CE7" />
      <stop offset="100%" stop-color="#A29BFE" />
    </linearGradient>
    <clipPath id="clip">
      <rect width="480" height="440" rx="24" />
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
