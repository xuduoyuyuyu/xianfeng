      <path d="M0,-14 L3.5,-5 L14,-5 L5.5,1.5 L8.5,12 L0,6 L-8.5,12 L-5.5,1.5 L-14,-5 L-3.5,-5 Z" fill="url(#yellowAccent)" />
    </g>
    <g transform="translate(85, 170)" opacity="0.5">
      <path d="M0,-9 L2.2,-3 L9,-3 L3.6,1 L5.4,7.5 L0,3.5 L-5.4,7.5 L-3.6,1 L-9,-3 L-2.2,-3 Z" fill="url(#yellowAccent)" />
    </g>
    <g transform="translate(395, 310)" opacity="0.45">
