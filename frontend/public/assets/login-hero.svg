      <ellipse cx="10" cy="1" rx="3" ry="4.5" fill="#2D1B0E" />
      <circle cx="-9" cy="-0.5" r="1.3" fill="white" />
      <circle cx="11" cy="-0.5" r="1.3" fill="white" />
      
      <!-- Eyebrows -->
      <path d="M-16,-7 Q-10,-11 -4,-7" stroke="#3D2918" stroke-width="1.8" fill="none" stroke-linecap="round" />
      <path d="M4,-7 Q10,-11 16,-7" stroke="#3D2918" stroke-width="1.8" fill="none" stroke-linecap="round" />
      
      <!-- Nose -->
      <path d="M0,4 Q2,9 4,9" stroke="#E0B098" stroke-width="1.2" fill="none" stroke-linecap="round" />
      
      <!-- Mouth -->
      <path d="M-6,11 Q0,17.5 6,11" stroke="#D49573" stroke-width="1.8" fill="none" stroke-linecap="round" />
      
      <!-- Blush -->
      <ellipse cx="-18" cy="9" rx="7" ry="3.5" fill="#F5B0B0" opacity="0.3" />
      <ellipse cx="18" cy="9" rx="7" ry="3.5" fill="#F5B0B0" opacity="0.3" />
