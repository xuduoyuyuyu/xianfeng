      <line x1="12" y1="34" x2="42" y2="34" stroke="#C8BAF2" stroke-width="1.5" />
      <rect x="15" y="18" width="7" height="16" rx="1.5" fill="#7868E6" opacity="0.6" />
      <rect x="24" y="8" width="7" height="26" rx="1.5" fill="#7868E6" opacity="0.8" />
