      <rect x="30" y="-4" width="12" height="22" rx="2" fill="url(#purple1)" />
      <rect x="7" y="25" width="9" height="9" rx="1.5" fill="white" opacity="0.6" />
      <rect x="22" y="25" width="9" height="9" rx="1.5" fill="white" opacity="0.6" />
      <rect x="37" y="25" width="9" height="9" rx="1.5" fill="white" opacity="0.6" />
      <rect x="7" y="40" width="9" height="9" rx="1.5" fill="white" opacity="0.6" />
      <rect x="22" y="40" width="9" height="9" rx="1.5" fill="white" opacity="0.6" />
      <rect x="37" y="40" width="9" height="9" rx="1.5" fill="white" opacity="0.6" />
