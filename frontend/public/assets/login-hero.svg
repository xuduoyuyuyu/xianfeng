      <rect x="-2" y="8" width="54" height="6" rx="2" fill="#9B8CF2" opacity="0.2" />
      <line x1="10" y1="22" x2="40" y2="22" stroke="#C8BAF2" stroke-width="2" stroke-linecap="round" />
      <line x1="10" y1="30" x2="33" y2="30" stroke="#C8BAF2" stroke-width="2" stroke-linecap="round" />
      <line x1="10" y1="38" x2="37" y2="38" stroke="#C8BAF2" stroke-width="2" stroke-linecap="round" />
      <line x1="10" y1="46" x2="28" y2="46" stroke="#C8BAF2" stroke-width="2" stroke-linecap="round" />
