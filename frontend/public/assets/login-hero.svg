      <rect x="0" y="0" width="44" height="14" rx="5" fill="#7868E6" opacity="0.5" />
      <rect x="0" y="9" width="44" height="5" fill="#7868E6" opacity="0.5" />
      <text x="22" y="37" text-anchor="middle" font-size="18" font-weight="900" fill="#5B4DBC" opacity="0.6">17</text>
