<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Zhi² 错题同步上传界面</title>
<script src="/wel/vendor/tailwindcdn.forms.container-queries.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#fdfdfd",
                        "background-dark": "#191022",
                        "pearl-white": "#fcfcfc",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "Noto Sans SC", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .glass-node {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(127, 19, 236, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .neon-border {
            border: 2px dashed rgba(127, 19, 236, 0.5);
            box-shadow: 0 0 15px rgba(127, 19, 236, 0.2), inset 0 0 15px rgba(127, 19, 236, 0.1);
        }
        .neon-border:hover {
            border-color: #7f13ec;
            box-shadow: 0 0 25px rgba(127, 19, 236, 0.4), inset 0 0 20px rgba(127, 19, 236, 0.15);
        }
        .glow-button {
            background: #7f13ec;
            box-shadow: 0 0 20px rgba(127, 19, 236, 0.6);
            position: relative;
            overflow: hidden;
        }
        .glow-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .glow-button:hover::after {
            opacity: 1;
        }
        .map-bg {
            background-image: radial-gradient(circle at 2px 2px, #ece4f5 1px, transparent 0);
            background-size: 40px 40px;
        }
        body {
            font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-pearl-white font-display text-slate-900">
<div class="relative min-h-screen w-full map-bg">
<main class="max-w-3xl mx-auto py-16 px-6">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold mb-2">错题导入</h1>
<p class="text-slate-500 text-sm">上传后将用于错题归因与修复</p>
</div>
<div class="bg-white rounded-3xl p-8 border border-primary/10 shadow-xl shadow-primary/5">
<div class="neon-border rounded-2xl flex flex-col items-center justify-center p-14 bg-primary/[0.02]">
<div class="size-20 bg-primary/10 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-5xl">cloud_upload</span>
</div>
<h3 class="text-xl font-bold text-slate-800 mb-2">上传错题文件</h3>
<p class="text-slate-400 text-sm mb-6">支持批量拍照与本地文件导入</p>
<div class="flex gap-4">
<button class="px-6 py-2 border border-primary/20 rounded-full text-sm font-bold text-primary hover:bg-primary/5 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-lg">add_a_photo</span>
<span>批量拍照</span>
</button>
<button class="px-6 py-2 bg-primary border border-primary rounded-full text-sm font-bold text-white shadow-[0_0_20px_rgba(127,19,236,0.35)] hover:shadow-[0_0_30px_rgba(127,19,236,0.5)] transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg !text-white !filter-none">upload_file</span>
<span>上传文件</span>
</button>
</div>
</div>
</div>
</main>
</div>
</body></html>
