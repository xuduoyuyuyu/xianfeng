<!DOCTYPE html>
<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>wel AI 极速初探答题界面</title>
<script src="/wel/vendor/tailwindcdn.forms.container-queries.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "pearl": "#fbfbfc",
                        "electron-purple": "#8b2cf5",
                        "soft-purple": "#f5f0ff",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans SC", "sans-serif"]
                    },
                    backgroundImage: {
                        'data-stream': "url(\"data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%237f13ec' fill-opacity='0.03'%3E%3Crect x='10' y='10' width='1' height='20'/%3E%3Crect x='30' y='50' width='1' height='15'/%3E%3Crect x='50' y='20' width='1' height='30'/%3E%3Crect x='70' y='60' width='1' height='10'/%3E%3Crect x='90' y='30' width='1' height='25'/%3E%3C/g%3E%3C/svg%3E\")",
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-display bg-pearl text-slate-900 overflow-hidden;
            }
        }
        .progress-pulse {
            box-shadow: 0 0 15px rgba(139, 44, 245, 0.4);
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: scaleX(1); }
            50% { opacity: 0.7; transform: scaleX(1.01); }
        }
        .option-card {
            @apply relative overflow-hidden bg-white border border-slate-100 rounded-2xl p-6 transition-all duration-300 cursor-pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .option-card:hover {
            @apply border-primary/40 -translate-y-1;
            box-shadow: 0 0 20px rgba(127, 19, 236, 0.15);
        }
        .option-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(139, 44, 245, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .option-card:hover::after {
            transform: translateX(100%);
        }
        .ai-float-ball {
            background: linear-gradient(135deg, #8b2cf5 0%, #7f13ec 100%);
            box-shadow: 0 10px 25px rgba(127, 19, 236, 0.3);
        }
        .ai-toast-fade {
            animation: toast-fadeout .5s ease 3s forwards;
        }
        @keyframes toast-fadeout {
            to { opacity: 0; transform: translateY(6px); visibility: hidden; }
        }
    </style>
</head>
<body class="antialiased min-h-screen relative">
<div class="fixed inset-0 bg-data-stream pointer-events-none opacity-50"></div>
<div class="fixed top-0 left-0 w-full h-1.5 bg-slate-100 z-50">
<div id="quick-progress-bar" class="h-full bg-electron-purple progress-pulse" style="width: 0%;"></div>
</div>
<header class="hidden">
<div class="flex items-center gap-3 text-primary">
<div class="size-9 flex items-center justify-center bg-primary rounded-xl text-white shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-xl">auto_awesome</span>
</div>
<img src="/logo.png" alt="Logo" class="h-6" />
</div>
<div class="flex items-center gap-4">
<div class="text-right">
<div class="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-0.5">Time Remaining</div>
<div class="text-xl font-bold text-slate-700 tabular-nums">04:12</div>
</div>
<button class="size-10 rounded-full border border-slate-200 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors">
<span class="material-symbols-outlined">pause</span>
</button>
</div>
</header>
<main class="relative z-10 max-w-5xl mx-auto px-6 pt-12 mt-5 flex flex-col items-center">
<div class="w-full text-center space-y-12">
<div class="space-y-4">
<span class="inline-block px-3 py-1 rounded-md bg-soft-purple text-primary text-[10px] font-black tracking-[0.2em] uppercase">Current Question</span>
<h2 id="assess-question-title" class="text-slate-900 text-4xl md:text-5xl font-extrabold leading-tight max-w-4xl mx-auto">
                    如果一个圆柱的底面半径扩大 2 倍，高缩小为原来的 1/2，那么它的体积将如何变化？
                </h2>
<div id="assess-question-visual" data-geom-theme="assess" data-geom-title="几何图形高保真还原区域" class="hidden max-w-4xl mx-auto mt-2"></div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl mx-auto pt-8">
<div class="assess-option option-card group" data-opt-index="0">
<div class="flex items-center gap-4">
<div data-opt-letter class="size-10 rounded-xl bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 font-bold group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-colors">A</div>
<p data-opt-text class="text-lg font-semibold text-slate-700">保持不变</p>
</div>
</div>
<div class="assess-option option-card group" data-opt-index="1">
<div class="flex items-center gap-4">
<div data-opt-letter class="size-10 rounded-xl bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 font-bold group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-colors">B</div>
<p data-opt-text class="text-lg font-semibold text-slate-700">扩大为原来的 2 倍</p>
</div>
</div>
<div class="assess-option option-card group" data-opt-index="2">
<div class="flex items-center gap-4">
<div data-opt-letter class="size-10 rounded-xl bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 font-bold group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-colors">C</div>
<p data-opt-text class="text-lg font-semibold text-slate-700">扩大为原来的 4 倍</p>
</div>
</div>
<div class="assess-option option-card group" data-opt-index="3">
<div class="flex items-center gap-4">
<div data-opt-letter class="size-10 rounded-xl bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 font-bold group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-colors">D</div>
<p data-opt-text class="text-lg font-semibold text-slate-700">缩小为原来的 1/2</p>
</div>
</div>
</div>
</div>
</main>
<div class="fixed bottom-12 left-0 w-full px-10 flex justify-start items-end pointer-events-none">
<div class="pointer-events-auto">
<button class="flex items-center gap-2 text-slate-400 hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-xl transition-transform group-hover:-translate-x-1">west</span>
<span class="font-bold text-sm">上一题</span>
</button>
</div>
</div>
<div id="quick-adapt-toast" class="fixed right-8 bottom-8 z-40 pointer-events-none ai-toast-fade">
<div class="bg-white/90 backdrop-blur-md px-4 py-3 rounded-2xl border border-primary/10 shadow-xl max-w-xs flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm animate-pulse">monitoring</span>
<span class="text-[10px] font-bold text-primary tracking-widest uppercase">AI 实时自适应</span>
<div class="h-2 w-[1px] bg-slate-200 mx-1"></div>
<span id="quick-progress-text" class="text-[10px] font-bold text-slate-400 tracking-widest">PROGRESS: 01/20</span>
</div>
</div>
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-[20%] left-[-10%] w-[500px] h-[500px] bg-primary/2 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[10%] right-[-10%] w-[500px] h-[500px] bg-electron-purple/2 blur-[120px] rounded-full"></div>
</div>
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 pointer-events-none">
<span class="text-[10px] font-bold text-slate-300 tracking-widest uppercase italic">wel AI 适配快测版 v2.1</span>
</div>
<script>
(() => {
  const toast = document.getElementById('quick-adapt-toast');
  if (!toast) return;
  try {
    const k = 'wel.quick.adapt.toast.shown.v1';
    if (sessionStorage.getItem(k) === '1') {
      toast.remove();
      return;
    }
    sessionStorage.setItem(k, '1');
  } catch (e) {}
})();
</script>
</body></html>
