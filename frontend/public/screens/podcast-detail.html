            display: block;

            overflow-wrap: break-word;

        }

            box-shadow: inset 0 -2px 0 rgba(94, 23, 235, 0.95);

            line-height: 1.25;

            word-break: break-word;

            text-decoration: none;
            text-underline-offset: 2px;
            text-decoration-thickness: 1px;
            font-weight: 600;
        }

            position: absolute;
            left: 0;
            bottom: calc(100% + 10px);
            z-index: 20;
            min-width: 220px;
            max-width: 320px;

            transform: translateY(4px);

        /* 桌面端 layout - iframe 内无 Tailwind CDN，需显式定义 */
        @media (min-width: 1024px) {
            /* grid: lg:grid-cols-12 */
            main > div.grid {
                grid-template-columns: repeat(12, minmax(0, 1fr));
            }
            /* lg:col-span-8 */
            main > div.grid > div:first-child {
                grid-column: span 8 / span 8;
            }
            /* lg:col-span-4 */
            main > div.grid > aside {
                grid-column: span 4 / span 4;
            }
            /* lg:items-stretch */
            main > div.grid {
                align-items: stretch;
            }
            /* lg:self-stretch */
            main > div.grid > aside {
                align-self: stretch;
            }
            /* lg:sticky aside content */
            #deep-dive-sticky-wrap {
                position: sticky;
                top: 6rem;
                align-self: flex-start;
            }
            #mindmap-main-container svg {
                width: 100% !important;
                min-height: 420px;
                max-width: none !important;
            }
            #mindmap-main-container svg g {
                transform: none !important;
            }
        }

        @media (max-width: 768px) {

                overflow-x: hidden;
            }

                height: auto;
                min-height: 420px;
                padding-bottom: 24px;

                height: 50px;
            }
            .duotone-hero .mb-14 {
                margin-bottom: 24px;

            .duotone-hero .max-w-4xl {

            }

            }
            main {
                padding-top: 36px !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
                padding-bottom: 116px !important;
            }
            #transcript-section {
                padding: 20px 16px;
            }
            #transcript-list {
                gap: 26px;
            }
            .transcript-time {
                font-size: 11px;
            }
            #floating-back-to-top-btn {
                right: 14px;
                bottom: 104px;
                width: 52px;
                height: 52px;
                border-radius: 9999px;
            }
        }
        /* 确保逐字稿区域在桌面端正常宽度 */
        @media (min-width: 1024px) {
            #transcript-section {
                width: 100%;
            }
            #transcript-panel,
            #transcript-list {
                width: 100%;
                min-width: 0;
            }
            .transcript-row {
                width: 100%;
            }
            .transcript-body {
                max-width: 100%;
            }
        }

    
        /* 嘉宾胶囊切换 */
        #guest-roster-pills { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        #guest-roster-pills button { transition: all 0.2s; }
        #guest-roster-pills button.is-guest-active { box-shadow: 0 0 0 2px rgba(94,23,235,0.15); }
        #guest-avatar { transition: opacity 0.25s; }
        
        /* line-clamp 兼容（iframe 无 Tailwind CDN） */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            overflow: hidden;
        }
        .line-clamp-4 {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            overflow: hidden;
        }
        /* 长文本通用溢出保护 */
        #summary-body, #summary-highlight-text, .transcript-body, .transcript-body p, #deepdive-content p, #quickview-list p {
            word-break: break-word;
            overflow-wrap: break-word;
        }
        /* 返场心愿红心冒泡动画 */
        .return-wish-bubble {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 20px;
            animation: wishBubbleUp 1.2s ease-out forwards;
        }
        @keyframes wishBubbleUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(0deg);
            }
            30% {
                opacity: 1;
                transform: translateY(-30px) scale(1.2) rotate(-15deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(0.3) rotate(20deg);
            }
        }
</style>

<script>
(function () {
  const FALLBACK_COVER = "https://lh3.googleusercontent.com/aida-public/AB6AXuClCE9ekp3PPlQ8bcuZWinqGC_qfQf-TKqkEU8KY505YX7B7t4LSQZSAud82EAcnQ8DU6U5dhENuVIt1u7xMcWmrZYt96CrE3wPdvJEEU8D3QwFomwrExRMSX6sn5vIqZOzxsqYGyiAi4xd4dwF-CkAJ47nVOn-LcN0fX9B-jWTgrnx0RbS53aK04x_ceztbkSlZgTUPwIzjIPJCVkPhCLys2-E8Qn1x4fWfefog2RPPewNrTiiV3AL5R1IUaHBKVtTtXzyAoAD9KpW";
  const audio = new Audio();
  audio.preload = "metadata";

  const playerState = {
    isPlaying: false,
    currentTime: 0,
    duration: 0,
    playbackRate: 1.5,
    currentProgram: null,
    currentEpisode: null,
  };
  const transcriptState = {
    source: [],
    query: "",
    featuredOnly: false,
    largeFont: false,
    subtitleEnabled: false,
    activeSubtitleRow: -1,
    glossary: [],
  };
  const deepDiveStickyState = {
    ticking: false,
    mode: "sticky",
    fixedLeft: 0,
    fixedWidth: 0,
  };
  const favoriteState = {
    isFavorite: false,
  };
  const detailViewState = {
    mode: "mindmap",
  };
  function formatDate(value) {
    if (!value) return "未发布";
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return "未发布";
    return d.toLocaleDateString("zh-CN");
  }

  function formatClock(seconds) {
    if (!Number.isFinite(seconds) || seconds < 0) return "00:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
  }

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function escapeRegex(value) {
    return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function highlightText(text, query) {
    const raw = String(text || "");
    const q = String(query || "").trim();
    if (!q) return escapeHtml(raw);
    const pattern = new RegExp("(" + escapeRegex(q) + ")", "ig");
    return escapeHtml(raw).replace(pattern, '<mark class="bg-primary/15 text-primary rounded-sm px-0.5">$1</mark>');
  }

  function resolveSpeakerIdentity(speaker) {
    var raw = String(speaker || "").trim();
    var lower = raw.toLowerCase();
    if (!raw) return { role: "嘉宾", name: "嘉宾" };
    // 阿力和Jessie — 数据库里可能存"阿力"或"主播·阿力"
    if (lower === "ali" || lower === "阿力" || lower === "all" || lower === "主播·阿力") return { role: "主播·阿力", name: "主播·阿力" };
    if (lower === "jessie" || lower === "主播·jessie") return { role: "主播·Jessie", name: "主播·Jessie" };
    if (lower === "主持人" || lower === "host") return { role: "主播·阿力", name: "主播·阿力" };
    // 嘉宾统一加"嘉宾·"前缀
    var displayName = raw;
    if (raw && raw.indexOf("嘉宾·") !== 0 && raw.indexOf("嘉宾") !== 0 && raw.indexOf("主播") !== 0) {
      displayName = "嘉宾·" + raw;
    }
    return { role: "嘉宾", name: displayName };
  }

  function splitGuestNames(rawName) {
    const raw = String(rawName || "").trim();
    if (!raw) return [];
    return raw
      .split(/[、,，/&|和与]/g)
      .map(function (item) { return item.trim(); })
      .filter(Boolean);
  }

  function buildGuestRoster(program, transcriptRows) {
    const names = [];
    const pushUnique = function (name) {
      const n = String(name || "").trim();
      if (!n) return;
      if (names.indexOf(n) >= 0) return;
      names.push(n);
    };

    // 1. 从节目绑定的 guest.name 和 guests 字段获取
    splitGuestNames(program && program.guest && program.guest.name).forEach(pushUnique);
    var guestsField = Array.isArray(program && program.guests) ? program.guests : [];
    guestsField.forEach(function (g) {
      splitGuestNames(String(g || "")).forEach(pushUnique);
    });

    // 2. 如果节目没有设置任何嘉宾，回退到从逐字稿中提取
    if (names.length === 0) {
      (Array.isArray(transcriptRows) ? transcriptRows : []).forEach(function (row) {
        var identity = resolveSpeakerIdentity(row && row.speaker);
        if (!identity || identity.role !== "嘉宾") return;
        // 侧边栏去掉"嘉宾·"前缀
        var guestName = identity.name.replace(/^嘉宾[·\.]/, "");
        splitGuestNames(guestName).forEach(pushUnique);
      });
    }

    return names.slice(0, 8);
  }

  function annotateGlossaryTerms(rawText, glossary, globalHitMap) {
    const hitMap = globalHitMap || {};
    const list = Array.isArray(glossary) ? glossary.slice() : [];
    const raw = String(rawText || "");
    if (!list.length) return escapeHtml(raw);
    const variants = [];
    list.forEach(function (item) {
      const definition = String(item && item.definition || "").trim();
      const term = String(item && item.term || "").trim();
      if (!term || !definition) return;
      const aliases = Array.isArray(item && item.aliases) ? item.aliases : [];
      [term].concat(aliases).forEach(function (candidate, index) {
        const label = String(candidate || "").trim();
        if (!label) return;
        variants.push({
          label: label,
          displayTerm: term,
          definition: definition,
          sourceUrl: String(item && item.sourceUrl || "").trim(),
          isPrimary: index === 0,
        });
      });
    });
    variants.sort(function (a, b) {
      return String(b.label || "").length - String(a.label || "").length;
    });
    if (!variants.length) return escapeHtml(raw);
    const chunks = [];
    let cursor = 0;
    while (cursor < raw.length) {
      let nextMatch = null;
      for (let i = 0; i < variants.length; i += 1) {
        const item = variants[i] || {};
        const label = String(item.label || "");
        if (!label) continue;
        const pos = raw.indexOf(label, cursor);
        if (pos < 0) continue;
        if (!nextMatch || pos < nextMatch.pos || (pos === nextMatch.pos && label.length > nextMatch.label.length)) {
          nextMatch = { pos: pos, label: label, item: item };
        }
      }
      if (!nextMatch) break;
      if (nextMatch.pos > cursor) {
        chunks.push(escapeHtml(raw.slice(cursor, nextMatch.pos)));
      }
      const matchedText = raw.slice(nextMatch.pos, nextMatch.pos + nextMatch.label.length);
      const displayKey = String(nextMatch.item.displayTerm || nextMatch.label);
      hitMap[displayKey] = Number(hitMap[displayKey] || 0) + 1;
      const isFirst = hitMap[displayKey] === 1 && !!nextMatch.item.isPrimary;
      const className = isFirst ? "transcript-term-link transcript-term-link--primary" : "transcript-term-link";
      const safeDefinition = escapeHtml(String(nextMatch.item.definition || ""));
      const sourceUrl = String(nextMatch.item.sourceUrl || "").trim();
      const sourceLink = sourceUrl
        ? '<a class="transcript-term-tooltip-link" href="' + escapeHtml(sourceUrl) + '" target="_blank" rel="noopener noreferrer">来源</a>'
        : "";
      chunks.push('<span class="transcript-term-anchor"><span class="' + className + '" title="术语解释">' + escapeHtml(matchedText) + '</span><span class="transcript-term-tooltip"><span class="transcript-term-tooltip-title">' + escapeHtml(nextMatch.item.displayTerm || nextMatch.label) + "</span>" + safeDefinition + sourceLink + "</span></span>");
      cursor = nextMatch.pos + nextMatch.label.length;
    }
    if (cursor < raw.length) {
      chunks.push(escapeHtml(raw.slice(cursor)));
    }
    return chunks.join("");
  }

  function parseClockToSeconds(text) {
    const raw = String(text || "").trim();
    if (!raw) return null;
    if (/^\d+(\.\d+)?$/.test(raw)) return Math.max(0, Number(raw));
    const parts = raw.split(":").map(function (p) { return Number(p); });
    if (parts.some(function (p) { return Number.isNaN(p); })) return null;
    if (parts.length === 2) return Math.max(0, parts[0] * 60 + parts[1]);
    if (parts.length === 3) return Math.max(0, parts[0] * 3600 + parts[1] * 60 + parts[2]);
    return null;
  }

  function getSegmentRange(segment, nextSegment) {
    const tokens = String(segment && segment.time || "").match(/\d{1,2}:\d{2}(?::\d{2})?/g) || [];
    let startSec = Number.isFinite(segment && segment.startSec) ? Number(segment.startSec) : parseClockToSeconds(tokens[0]);
    let endSec = Number.isFinite(segment && segment.endSec) ? Number(segment.endSec) : parseClockToSeconds(tokens[1]);
    if (endSec === null || !Number.isFinite(endSec)) {
      const nextTokens = String(nextSegment && nextSegment.time || "").match(/\d{1,2}:\d{2}(?::\d{2})?/g) || [];
      const nextStart = Number.isFinite(nextSegment && nextSegment.startSec) ? Number(nextSegment.startSec) : parseClockToSeconds(nextTokens[0]);
      if (Number.isFinite(nextStart) && Number.isFinite(startSec) && nextStart > startSec) {
        endSec = nextStart;
      } else if (Number.isFinite(startSec)) {
        endSec = startSec + 6;
      }
    }
    if (!Number.isFinite(startSec) && Number.isFinite(endSec)) startSec = Math.max(0, endSec - 6);
    if (!Number.isFinite(startSec)) startSec = 0;
    if (!Number.isFinite(endSec) || endSec <= startSec) endSec = startSec + 6;
    return { startSec: startSec, endSec: endSec };
  }

  function setPlayButtons(isPlaying) {
    document.getElementById("hero-play-icon").textContent = isPlaying ? "pause" : "play_arrow";
    document.getElementById("player-play-icon").textContent = isPlaying ? "pause" : "play_arrow";
  }

  function updateProgressUI() {
    const current = playerState.currentTime;
    const duration = playerState.duration;
    const ratio = duration > 0 ? Math.min((current / duration) * 100, 100) : 0;
    document.getElementById("player-current-time").textContent = formatClock(current);
    document.getElementById("player-duration-time").textContent = formatClock(duration);
    document.getElementById("player-progress-bar").style.width = ratio + "%";
  }

  function syncPlaybackRate() {
    audio.playbackRate = playerState.playbackRate;
    document.getElementById("player-speed-btn").textContent = playerState.playbackRate.toFixed(1) + "x";
  }

  function isMongoId(value) {
    return /^[a-f\d]{24}$/i.test(value || "");
  }

  function isNumericId(value) {
    return /^\d+$/.test(value || "");
  }

  function getIdFromPath() {
    try {
      const queryId = new URLSearchParams(window.location.search).get("programId");
      if (queryId) return queryId;
    } catch (_error) {}
    const parts = window.location.pathname.split("/").filter(Boolean);
    return parts[parts.length - 1] || "";
  }

  function normalizeText(value) {
    return String(value || "").toLowerCase();
  }

  function resolvePlayableAudioUrl(value) {
    const raw = String(value || "").trim();
    if (!raw) return "";
    try {
      const parsed = new URL(raw, window.location.origin);
      const path = parsed.pathname || "";
      const isUploadedAudio = /\/uploads\/audio\//.test(path);
      const isLocalLikeHost =
        ["localhost", "127.0.0.1", "0.0.0.0", "backend"].indexOf(parsed.hostname || "") >= 0;

      if (isUploadedAudio) {
        return window.location.origin + path + (parsed.search || "");
      }
      if (isLocalLikeHost && parsed.hostname !== window.location.hostname) {
        return window.location.origin + path + (parsed.search || "");
      }
      return parsed.toString();
    } catch (_error) {
      if (raw.startsWith("/")) return window.location.origin + raw;
      return raw;
    }
  }

  function isTestProgram(program) {
    const title = normalizeText(program && program.title);
    return (
      title.indexOf("待解析节目-") >= 0 ||
      title.indexOf("联调") >= 0 ||
      title.indexOf("ai联调节目-") >= 0
    );
  }

  function findProgramByRouteId(programs, routeId) {
    const list = Array.isArray(programs) ? programs : [];
    if (!list.length) return null;
    const byCode = list.find(function (item) { return String(item && item.programCode || "").toLowerCase() === String(routeId || "").toLowerCase(); });
    if (byCode) return byCode;
    const exact = list.find(function (item) { return String(item && item._id) === String(routeId); });
    if (exact) return exact;
    if (!isNumericId(routeId)) return null;

    const targetNum = Number(routeId);
    const tokenRegex = new RegExp("(^|\\D)" + String(targetNum) + "(\\D|$)");
    const byEpisodeTitle = list.find(function (item) {
      const episodeTitle = normalizeText(item && item.episodes && item.episodes[0] && item.episodes[0].title);
      return tokenRegex.test(episodeTitle);
    });
    if (byEpisodeTitle) return byEpisodeTitle;

    const byProgramTitle = list.find(function (item) {
      const title = normalizeText(item && item.title);
      return tokenRegex.test(title);
    });
    if (byProgramTitle) return byProgramTitle;

    const byIndex = targetNum > 0 && targetNum <= list.length ? list[targetNum - 1] : null;
    return byIndex || null;
  }

  function getProgramQualityScore(program) {
    if (!program) return 0;
    const transcriptCount = Array.isArray(program.transcript) ? program.transcript.length : 0;
    const guest = program.guest || {};
    const summary = program.summary || {};
    const parseStatus = String(program.parseStatus || "");
    let score = 0;
    if (parseStatus === "success") score += 1000;
    if (transcriptCount > 0) score += Math.min(600, transcriptCount);
    if (hasText(guest.name)) score += 120;
    if (hasText(guest.title)) score += 60;
    if (hasText(summary.headline) || hasText(summary.body)) score += 80;
    return score;
  }

  function pickBestProgram(programs) {
    const list = Array.isArray(programs) ? programs.slice() : [];
    if (!list.length) return null;
    list.sort(function (a, b) {
      const diff = getProgramQualityScore(b) - getProgramQualityScore(a);
      if (diff !== 0) return diff;
      const ta = new Date(a.updatedAt || a.createdAt || 0).getTime();
      const tb = new Date(b.updatedAt || b.createdAt || 0).getTime();
      return tb - ta;
    });
    return list[0] || null;
  }

  function hasParsedContent(program) {
    if (!program) return false;
    const summary = program.summary || {};
    const transcript = Array.isArray(program.transcript) ? program.transcript : [];
    return (
      hasText(summary.headline) ||
      hasText(summary.body) ||
      transcript.length > 0
    );
  }

  function hasPlayableEpisodeUrl(program) {
    const episode = program && program.episodes && program.episodes[0];
    const playable = resolvePlayableAudioUrl(episode && episode.url);
    return !!String(playable || "").trim();

  function hasText(value) {

  function renderTranscript(items) {
    const list = document.getElementById("transcript-list");
    const textClass = transcriptState.largeFont ? "text-base" : "text-sm";
    const itemsToRender = (Array.isArray(items) ? items : []).filter(function (segment) {
      if (transcriptState.featuredOnly && !segment.featured) return false;
      if (!transcriptState.query) return true;
      const q = transcriptState.query.toLowerCase();
      return String(segment.time || "").toLowerCase().indexOf(q) >= 0 ||
        String(segment.speaker || "").toLowerCase().indexOf(q) >= 0 ||
        String(segment.text || "").toLowerCase().indexOf(q) >= 0;
    });
    if (!itemsToRender.length) {
      list.innerHTML = '<div class="rounded-2xl border border-gray-200 bg-gray-50 px-5 py-6 text-sm font-bold text-on-surface-variant">未找到匹配内容，请调整关键词或关闭“精华”筛选。</div>';
      transcriptState.activeSubtitleRow = -1;
      return;
    }
    const termHitMap = {};
    list.innerHTML = itemsToRender.map(function (segment, index) {
      const featured = !!segment.featured;
      const nextSegment = itemsToRender[index + 1];
      const range = getSegmentRange(segment, nextSegment);
      const speakerIdentity = resolveSpeakerIdentity(segment.speaker);
      const speakerName = String(speakerIdentity.name || "").trim();
      const speakerLabel = speakerIdentity.name || speakerIdentity.role;
      return '<div class="transcript-row ' + (featured ? "relative group" : "group") + '" data-subtitle-index="' + index + '" data-start-sec="' + range.startSec + '" data-end-sec="' + range.endSec + '">' +
        '<div class="py-3">' +
        '<div class="mb-2 text-xs font-black text-primary text-left transcript-time">' + escapeHtml(segment.time || "00:00-00:30") + ' <span class="text-primary/35">·</span> <span class="text-primary">' + escapeHtml(speakerLabel || "嘉宾") + "</span></div>" +
        '<p class="transcript-body ' + textClass + ' leading-relaxed text-left text-on-surface">' +
        (transcriptState.query ? highlightText(segment.text || "", transcriptState.query) : annotateGlossaryTerms(segment.text || "", transcriptState.glossary, termHitMap)) +
        "</p>" +
        "</div></div>";
    }).join("");
    if (transcriptState.subtitleEnabled) {
      requestAnimationFrame(function () {
        syncSubtitleHighlight(audio.currentTime || 0, false);
      });
    }
  }

  function clearSubtitleHighlight() {
    const bodies = document.querySelectorAll("#transcript-list .transcript-body.is-playing");
    bodies.forEach(function (node) { node.classList.remove("is-playing"); });
    const times = document.querySelectorAll("#transcript-list .transcript-time.is-playing");
    times.forEach(function (node) { node.classList.remove("is-playing"); });
    const speakers = document.querySelectorAll("#transcript-list .transcript-speaker.is-playing");
    speakers.forEach(function (node) { node.classList.remove("is-playing"); });
    transcriptState.activeSubtitleRow = -1;
  }

  function syncSubtitleButton() {
    const btn = document.getElementById("player-subtitle-btn");
    if (!btn) return;
    btn.classList.toggle("is-active", !!transcriptState.subtitleEnabled);
  }

  function syncSubtitleHighlight(currentTime, allowScroll) {
    if (!transcriptState.subtitleEnabled) {
      clearSubtitleHighlight();
      return;
    }
    const rows = Array.prototype.slice.call(document.querySelectorAll("#transcript-list .transcript-row"));
    if (!rows.length) return;
    let nextIndex = -1;
    for (let i = 0; i < rows.length; i += 1) {
      const row = rows[i];
      const start = Number(row.getAttribute("data-start-sec") || "0");
      const end = Number(row.getAttribute("data-end-sec") || (start + 6));
      if (currentTime >= start && currentTime < end) {
        nextIndex = i;
        break;
      }
      if (currentTime >= start) nextIndex = i;
    }
    if (nextIndex < 0) nextIndex = 0;
    if (nextIndex === transcriptState.activeSubtitleRow) return;
    clearSubtitleHighlight();
    const activeRow = rows[nextIndex];
    if (!activeRow) return;
    const activeBody = activeRow.querySelector(".transcript-body");
    if (activeBody) activeBody.classList.add("is-playing");
    const activeTime = activeRow.querySelector(".transcript-time");
    if (activeTime) activeTime.classList.add("is-playing");
    const activeSpeaker = activeRow.querySelector(".transcript-speaker");
    if (activeSpeaker) activeSpeaker.classList.add("is-playing");
    transcriptState.activeSubtitleRow = nextIndex;
    if (allowScroll) {
      activeRow.scrollIntoView({ behavior: "smooth", block: "center", inline: "nearest" });
    }
  }

  function buildDictionaryRelatedPrograms(program, programs) {
    const currentId = String(program && program._id || "");
    const dictionaryEntries = Array.isArray(program && program.dictionaryEntries) ? program.dictionaryEntries : [];
    const relatedIds = [];
    dictionaryEntries.forEach(function (entry) {
      const ids = Array.isArray(entry && entry.programIds) ? entry.programIds : [];
      ids.forEach(function (id) {
        const normalizedId = String(id || "");
        if (!normalizedId || normalizedId === currentId || relatedIds.indexOf(normalizedId) >= 0) return;
        relatedIds.push(normalizedId);
      });
    });
    const byId = {};
    (programs || []).forEach(function (item) {
      if (item && item._id) byId[String(item._id)] = item;
    });
    return relatedIds
      .map(function (id) { return byId[id]; })
      .filter(Boolean)
      .sort(function (a, b) {
        return new Date(b.publishedAt || b.createdAt || 0).getTime() - new Date(a.publishedAt || a.createdAt || 0).getTime();
      })
      .slice(0, 4);
  }

        '<p class="text-[11px] text-on-surface-variant/70 leading-relaxed">' + (item.description || "") + "</p></a>";
    }).join("");
  }

  function applyProgram(program, programs) {
    playerState.currentProgram = program;
    const cover = program.coverImage || FALLBACK_COVER;
    document.querySelector(".duotone-hero").style.setProperty("--hero-cover", 'url("' + cover + '")');
    document.getElementById("program-cover-image").src = cover;
    document.getElementById("player-cover-image").src = cover;
    document.getElementById("program-title").innerHTML = (program.title || "").replace(/\n/g, "<br/>");
    document.getElementById("player-title").textContent = program.title || "";
    document.getElementById("program-description").textContent = program.description || "";
    const episode = (program.episodes && program.episodes[0]) || {};
    const resolvedEpisodeUrl = resolvePlayableAudioUrl(episode.url);
    playerState.currentEpisode = {
      ...episode,
      url: resolvedEpisodeUrl,
    };
    const codeLabel = String(program.programCode || "").toUpperCase();
    document.getElementById("program-episode-badge").textContent = codeLabel ? ("EPISODE " + codeLabel) : (episode.title ? "EPISODE 01" : "EPISODE --");
    document.getElementById("program-meta").textContent = (episode.duration || "45 分钟") + " • " + formatDate(program.publishedAt || program.createdAt) + " 发布";
    document.getElementById("player-episode-label").textContent = codeLabel ? ("EP. " + codeLabel) : (episode.title ? "EP. 01" : "EP. --");
    document.getElementById("player-subtitle").textContent = episode.title || "暂无音频";
    if (audio.src !== (resolvedEpisodeUrl || "")) {
      audio.pause();
      playerState.isPlaying = false;
      // 不强制归零 — loadedmetadata 会从 localStorage 恢复上次位置
      playerState.currentTime = 0;
      playerState.duration = 0;
      setPlayButtons(false);
      updateProgressUI();
      audio.src = resolvedEpisodeUrl || "";
      syncPlaybackRate();
      audio.load();
    }

    const summary = program.summary || {};
    document.getElementById("summary-headline").innerHTML = '<span class="w-1.5 h-4 bg-primary rounded-xl"></span>' + (summary.headline || "—");
    document.getElementById("summary-body").textContent = summary.body || program.description || "";
    document.getElementById("summary-highlight-label").textContent = (summary.highlightLabel || "—") + "：";
    document.getElementById("summary-highlight-text").textContent = " " + (summary.highlightText || program.description || "");
    const tags = Array.isArray(summary.tags) && summary.tags.length ? summary.tags.slice(0, 4) : [];
    document.getElementById("summary-tags").innerHTML = tags.map(function (tag) {
      return '<span class="px-3 py-1 rounded-xl bg-gray-100 text-[10px] font-bold text-gray-500 whitespace-nowrap">' + tag + "</span>";
    }).join("");

    const transcriptRaw = Array.isArray(program.transcript) && program.transcript.length ? program.transcript : transcriptFallback(program);
    const transcript = (function (rows) {
      const parseTime = function (value) {
        if (typeof value === "number" && Number.isFinite(value)) return Math.max(0, value);
        const raw = String(value || "").trim();
        if (!raw) return null;
        if (/^\d+(\.\d+)?$/.test(raw)) return Math.max(0, Number(raw));
        const parts = raw.split(":").map(function (p) { return Number(p); });
        if (parts.some(function (p) { return Number.isNaN(p); })) return null;
        if (parts.length === 2) return Math.max(0, parts[0] * 60 + parts[1]);
        if (parts.length === 3) return Math.max(0, parts[0] * 3600 + parts[1] * 60 + parts[2]);
        return null;
      };
      const formatTime = function (seconds) {
        const total = Math.max(0, Math.floor(seconds || 0));
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        return h > 0 ? (String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0")) : (String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0"));
      };
      const items = [];
      (Array.isArray(rows) ? rows : []).forEach(function (row) {
        const text = String(row && row.text || "").trim();
        if (!text) return;
        const compact = text.toLowerCase().replace(/[，。！？、,.!?~\s]/g, "");
        if (compact.length <= 4 && /^(嗯|呃|啊|哦|诶|哎|唉|对|好|那个|是吧|可以吗|好的|是的|嗯嗯|啊啊|对对)+$/.test(compact)) return;
        const timeRaw = String(row && row.time || "");
        const tokens = timeRaw.match(/\d{1,2}:\d{2}(?::\d{2})?/g) || [];
        let startSec = parseTime(row && (row.startSec || row.start || row.startTime || row.from));
        let endSec = parseTime(row && (row.endSec || row.end || row.endTime || row.to));
        if (startSec === null && tokens[0]) startSec = parseTime(tokens[0]);
        if (endSec === null && tokens[1]) endSec = parseTime(tokens[1]);
        if (Number.isFinite(startSec) && Number.isFinite(endSec) && endSec < startSec) endSec = startSec + 4;
        const speaker = String(row && row.speaker || "嘉宾").trim() || "嘉宾";
        const last = items[items.length - 1];
        const canMerge = !!last &&
          last.speaker === speaker &&
          (last.text.length + text.length <= 320) &&
          (!Number.isFinite(startSec) || !Number.isFinite(last.endSec) || startSec - last.endSec <= 12);
        if (canMerge) {
          last.text += /[。！？.!?]$/.test(last.text) ? text : (" " + text);
          if (Number.isFinite(endSec)) last.endSec = endSec;
          if (Number.isFinite(startSec) && !Number.isFinite(last.startSec)) last.startSec = startSec;
          last.featured = last.featured || !!(row && row.featured);
          return;
        }
        items.push({
          speaker: speaker,
          text: text,
          featured: !!(row && row.featured),
          time: timeRaw,
          startSec: startSec,
          endSec: endSec,
        });
      });
      for (let i = 0; i < items.length; i += 1) {
        const curr = items[i];
        const next = items[i + 1];
        if (Number.isFinite(curr.startSec) && !Number.isFinite(curr.endSec)) {
          const nextStart = next && Number.isFinite(next.startSec) ? next.startSec : null;
          curr.endSec = Number.isFinite(nextStart) && nextStart > curr.startSec ? Math.min(nextStart, curr.startSec + 15) : curr.startSec + 6;
        }
        if (Number.isFinite(curr.startSec) && Number.isFinite(curr.endSec) && curr.endSec > curr.startSec) {
          curr.time = formatTime(curr.startSec) + "-" + formatTime(curr.endSec);
        }
      }
      return items;
    })(transcriptRaw);
    transcriptState.source = transcript.length ? transcript : transcriptFallback(program);
    transcriptState.glossary = Array.isArray(program.dictionaryEntries) && program.dictionaryEntries.length
      ? program.dictionaryEntries
      : (Array.isArray(program.termGlossary) ? program.termGlossary : []);
    renderTranscript(transcriptState.source);
    renderContentPack(program, transcriptState.source);

    // === 嘉宾数据处理 ===
    const guestBindings = Array.isArray(program.guestBindings) ? program.guestBindings : [];
    const guests = guestBindings.length > 0
      ? guestBindings.map(function(b) { return b.guest || {}; }).filter(function(g) { return g.name; })
      : (program.guest && program.guest.name ? [program.guest] : []);
    const guest = guests[0] || program.guest || {};
    var activeGuestIdx = 0;

    function selectGuest(idx) {
      if (idx === activeGuestIdx) return;
      var oldBtn = document.querySelector("#guest-roster-pills button.is-guest-active");
      if (oldBtn) {

        oldBtn.classList.add("bg-white", "text-on-surface", "border", "border-gray-200");
      }
      activeGuestIdx = idx;
      var newBtn = document.querySelector("#guest-roster-pills button[data-guest-idx=\"" + idx + "\"]");
      if (newBtn) {

        newBtn.classList.add("is-guest-active", "bg-primary/10", "text-primary", "border", "border-primary/30");

      avatarEl.src = g.avatar || guest.avatar || FALLBACK_COVER;

      // 切换嘉宾后更新返场心愿按钮状态
      var wishBtn = document.getElementById("return-wish-btn");
      if (wishBtn) {
        // 始终可点击，只更新 title 提示
        var newGuestId = (g && g._id) || (guest && guest._id);

        return "<button type=\"button\" onclick=\"window._selectGuest(" + idx + ")\" data-guest-idx=\"" + idx + "\" class=\"inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-[11px] font-bold transition-all cursor-pointer " + cls + "\">" + avatarHtml + "<span class=\"truncate max-w-[80px]\">" + escapeHtml(g.name || "") + "</span></button>";

    // 设置初始嘉宾信息

    // 返场心愿 — 允许反复点击（特效 + 反馈，不重复计数）
    (function () {
      var btn = document.getElementById("return-wish-btn");

      if (!btn) return;
      var guestId = (guests[activeGuestIdx] && guests[activeGuestIdx]._id) || (guest && guest._id);
      var programId = program._id;
      // 与 GuestWishButton 共用同一套 localStorage key，key 统一用 guestId
      var WISH_KEY = "xf_guest_wishes";
      var WISH_SENT_KEY = "xf_guest_wishes_sent";

      var hasRecorded = false;
      try {

        var data = JSON.parse(localStorage.getItem(WISH_KEY) || "{}");

      } catch (_) {}

      function spawnBubbles() {
        var rect = btn.getBoundingClientRect();

        if (!hasRecorded) {
          hasRecorded = true;
          try {
            var sent2 = JSON.parse(localStorage.getItem(WISH_SENT_KEY) || "{}");
            sent2[currentWishKey] = true;
            localStorage.setItem(WISH_SENT_KEY, JSON.stringify(sent2));
            var data2 = JSON.parse(localStorage.getItem(WISH_KEY) || "{}");
            data2[currentWishKey] = (data2[currentWishKey] || 0) + 1;
            localStorage.setItem(WISH_KEY, JSON.stringify(data2));
            if (countLabel) countLabel.textContent = data2[currentWishKey];
          } catch (_) {}
        }

        // 后端自动去重，每次都发请求让后端处理
        fetch("/api/guests/" + currentGuestId + "/return-wish", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ programId: programId })
        }).catch(function () {});
      });
    })();

    const deepDive = program.deepDive || {};
    document.getElementById("deep-dive-title").textContent = deepDive.sectionTitle || "深度挖掘 Deep Dive";
    const reading = Array.isArray(deepDive.curatedReading) && deepDive.curatedReading.length ? deepDive.curatedReading : [{ title: "《家庭教育中的低摩擦沟通》", subtitle: "围绕节目主题延展出的实用阅读线索" }];
    document.getElementById("curated-reading-list").innerHTML = reading.map(function (item) {
      const href = item.url ? ' href="' + item.url + '" target="_blank" rel="noopener noreferrer"' : "";
      return "<a" + href + ' class="group block cursor-pointer"><h4 class="text-xs font-bold text-on-surface group-hover:text-primary transition-colors leading-snug break-words">' + (item.title || "") + '</h4><p class="text-[10px] text-gray-400 mt-1 break-all">' + (item.subtitle || "") + "</p></a>";
    }).join("");

    renderRelated(program, programs);
    initMindMapData(deepDive);
    requestDeepDiveFloatingUpdate();
    syncFavoriteButton(program);
  }

  function getFavoriteStorageKey(program) {
    const id = program && program._id ? String(program._id) : String(program && program.title || "");
    return "program:fav:" + id;
  }

  function syncFavoriteButton(program) {
    const btn = document.getElementById("hero-favorite-btn");
    const icon = document.getElementById("hero-favorite-icon");
    if (!btn || !icon || !program) return;
    const key = getFavoriteStorageKey(program);
    favoriteState.isFavorite = localStorage.getItem(key) === "1";
    if (favoriteState.isFavorite) {
      btn.classList.add("bg-white/20");
      icon.textContent = "bookmark";
      return;
    }
    btn.classList.remove("bg-white/20");
    icon.textContent = "bookmark_add";
  }

  function toggleFavorite() {
    const program = playerState.currentProgram;
    if (!program) return;
    const key = getFavoriteStorageKey(program);
    favoriteState.isFavorite = !favoriteState.isFavorite;
    if (favoriteState.isFavorite) {
      localStorage.setItem(key, "1");
    } else {
      localStorage.removeItem(key);
    }
    syncFavoriteButton(program);
  }

  async function shareProgram() {
    const program = playerState.currentProgram;
    const shareUrl = window.location.href;
    const title = (program && program.title) || document.title || "播客节目";
    try {
      if (navigator.share) {
        await navigator.share({ title: title, text: "推荐你收听这期节目", url: shareUrl });
        return;
      }
    } catch (_error) {}
    try {
      await navigator.clipboard.writeText(shareUrl);
      alert("链接已复制，可直接转发。");
    } catch (_error) {
      window.prompt("请复制链接进行转发：", shareUrl);
    }
  }

  async function togglePlay(event) {
    if (event && typeof event.preventDefault === "function") event.preventDefault();
    if (event && typeof event.stopPropagation === "function") event.stopPropagation();
    const episode = playerState.currentEpisode || {};
    if (!episode.url) {
      alert("当前节目缺少可播放音频链接。");
      return;
    }
    if (audio.paused) {
      try {
        await audio.play();
      } catch (_error) {
        alert("音频暂时无法播放，请稍后重试。");
      }
    } else {
      audio.pause();
    }
  }

  function seekBy(seconds) {
    const duration = playerState.duration || audio.duration || 0;
    if (!duration) return;
    audio.currentTime = Math.min(Math.max((audio.currentTime || 0) + seconds, 0), duration);
  }

  function seekToClick(event) {
    const track = document.getElementById("player-progress-track");
    const duration = playerState.duration || audio.duration || 0;
    if (!duration) return;
    const rect = track.getBoundingClientRect();
    const ratio = Math.min(Math.max((event.clientX - rect.left) / rect.width, 0), 1);
    audio.currentTime = ratio * duration;
  }

  function seekWithClientX(clientX) {
    const track = document.getElementById("player-progress-track");
    const duration = playerState.duration || audio.duration || 0;
    if (!duration) return;
    const rect = track.getBoundingClientRect();
    const ratio = Math.min(Math.max((clientX - rect.left) / rect.width, 0), 1);
    audio.currentTime = ratio * duration;
  }

  function toggleSpeed() {
    playerState.playbackRate = playerState.playbackRate === 1.5 ? 1 : 1.5;
    syncPlaybackRate();
  }

  function syncTranscriptToolState(featuredBtn, fontBtn) {
    if (featuredBtn) featuredBtn.classList.toggle("is-active", !!transcriptState.featuredOnly);
    if (fontBtn) fontBtn.classList.toggle("is-active", !!transcriptState.largeFont);
  }

  function bindPlayerEvents() {
    let isSeeking = false;
    const track = document.getElementById("player-progress-track");

    document.getElementById("hero-play-btn").addEventListener("click", function (event) { togglePlay(event); });
    document.getElementById("player-play-btn").addEventListener("click", function (event) { togglePlay(event); });
    document.getElementById("player-rewind-btn").addEventListener("click", function (event) { event.preventDefault(); seekBy(-10); });
    document.getElementById("player-forward-btn").addEventListener("click", function (event) { event.preventDefault(); seekBy(30); });
    track.addEventListener("click", seekToClick);
    track.addEventListener("mousedown", function (event) {
      isSeeking = true;
      seekWithClientX(event.clientX);
    });
    window.addEventListener("mousemove", function (event) {
      if (!isSeeking) return;
      seekWithClientX(event.clientX);
    });
    window.addEventListener("mouseup", function () {
      isSeeking = false;
    });

    track.addEventListener("touchstart", function (event) {
      isSeeking = true;
      const touch = event.touches && event.touches[0];
      if (touch) seekWithClientX(touch.clientX);
    }, { passive: true });
    window.addEventListener("touchmove", function (event) {
      if (!isSeeking) return;
      const touch = event.touches && event.touches[0];
      if (touch) seekWithClientX(touch.clientX);
    }, { passive: true });
    window.addEventListener("touchend", function () {
      isSeeking = false;
    });

    document.getElementById("player-speed-btn").addEventListener("click", function (event) { event.preventDefault(); toggleSpeed(); });
    const subtitleBtn = document.getElementById("player-subtitle-btn");
    if (subtitleBtn) {
      subtitleBtn.addEventListener("click", function (event) {
        event.preventDefault();
        transcriptState.subtitleEnabled = !transcriptState.subtitleEnabled;
        syncSubtitleButton();
        if (!transcriptState.subtitleEnabled) {
          clearSubtitleHighlight();
          return;
        }
        syncSubtitleHighlight(audio.currentTime || 0, true);
      });
      syncSubtitleButton();
    }
    document.getElementById("player-volume-btn").addEventListener("click", function (event) { togglePlay(event); });
    const heroFavoriteBtn = document.getElementById("hero-favorite-btn");
    if (heroFavoriteBtn) heroFavoriteBtn.addEventListener("click", toggleFavorite);
    const heroShareBtn = document.getElementById("hero-share-btn");
    if (heroShareBtn) heroShareBtn.addEventListener("click", shareProgram);
	    const detailModeQuickBtn = document.getElementById("detail-mode-quickview");
	    const detailModeTranscriptBtn = document.getElementById("detail-mode-transcript");
	    const detailModeMindmapBtn = document.getElementById("detail-mode-mindmap");
	    if (detailModeQuickBtn) {
	      detailModeQuickBtn.addEventListener("click", function () {
	        setDetailViewMode("quickview");
	      });
	    }
	    if (detailModeTranscriptBtn) {
	      detailModeTranscriptBtn.addEventListener("click", function () {
	        setDetailViewMode("transcript");
      });
    }
	    if (detailModeMindmapBtn) {
	      detailModeMindmapBtn.addEventListener("click", function () {
	        setDetailViewMode("mindmap");
      });
    }
    setDetailViewMode(detailViewState.mode);
    const transcriptSearchInput = document.getElementById("transcript-search-input");
    if (transcriptSearchInput) {
      transcriptSearchInput.addEventListener("input", function () {
        transcriptState.query = String(transcriptSearchInput.value || "").trim();
        renderTranscript(transcriptState.source);
      });
    }
    const transcriptFeaturedBtn = document.getElementById("transcript-featured-btn");
    if (transcriptFeaturedBtn) {
      transcriptFeaturedBtn.addEventListener("click", function () {
        transcriptState.featuredOnly = !transcriptState.featuredOnly;
        syncTranscriptToolState(transcriptFeaturedBtn, transcriptFontBtn);
        renderTranscript(transcriptState.source);
      });
    }
    const transcriptFontBtn = document.getElementById("transcript-font-btn");
    if (transcriptFontBtn) {
      transcriptFontBtn.addEventListener("click", function () {
        transcriptState.largeFont = !transcriptState.largeFont;
        syncTranscriptToolState(transcriptFeaturedBtn, transcriptFontBtn);
        renderTranscript(transcriptState.source);
      });
    }
    syncTranscriptToolState(transcriptFeaturedBtn, transcriptFontBtn);
    const backToTopBtn = document.getElementById("floating-back-to-top-btn");
    if (backToTopBtn) {
      backToTopBtn.addEventListener("click", function (event) {
        event.preventDefault();
        const target = document.getElementById("transcript-section");
        if (target) {
          const rect = target.getBoundingClientRect();
          const top = window.scrollY + rect.top - 86;
          window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
          return;
        }
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }
    audio.addEventListener("timeupdate", function () {
      playerState.currentTime = audio.currentTime || 0;
      updateProgressUI();
      syncSubtitleHighlight(playerState.currentTime, true);
      // 每 5 秒保存播放位置
      var episodeUrl = (playerState.currentEpisode && playerState.currentEpisode.url) || "";
      if (episodeUrl && Math.floor(playerState.currentTime) % 5 === 0) {
        try { localStorage.setItem("playback_pos_" + episodeUrl, String(playerState.currentTime)); } catch (_) {}
      }
    });
    audio.addEventListener("loadedmetadata", function () {
      playerState.duration = audio.duration || 0;
      updateProgressUI();
      // 读取上次播放位置，如果没听完就从那里继续
      var episodeUrl = (playerState.currentEpisode && playerState.currentEpisode.url) || "";
      if (episodeUrl) {
        try {
          var saved = localStorage.getItem("playback_pos_" + episodeUrl);
          if (saved) {
            var pos = parseFloat(saved);
            if (pos > 0 && pos < playerState.duration - 5) {
              audio.currentTime = pos;
              playerState.currentTime = pos;
              updateProgressUI();
              // 恢复播放状态：自动开始播放
              try {
                audio.play().catch(function() {});
              } catch (_) {}
            }
          }
        } catch (_) {}
      }
    });
    audio.addEventListener("play", function () {
      playerState.isPlaying = true;
      setPlayButtons(true);
    });
    audio.addEventListener("pause", function () {
      playerState.isPlaying = false;
      setPlayButtons(false);
      // 暂停时立即保存位置，确保刷新不丢
      var episodeUrl = (playerState.currentEpisode && playerState.currentEpisode.url) || "";
      if (episodeUrl && playerState.currentTime > 0) {
        try { localStorage.setItem("playback_pos_" + episodeUrl, String(playerState.currentTime)); } catch (_) {}
      }
    });
    audio.addEventListener("ended", function () {
      playerState.isPlaying = false;
      setPlayButtons(false);
      // 播放完毕，清除位置记录
      var episodeUrl = (playerState.currentEpisode && playerState.currentEpisode.url) || "";
      if (episodeUrl) {
        try { localStorage.removeItem("playback_pos_" + episodeUrl); } catch (_) {}
      }
    });
    audio.addEventListener("error", function () {
      const failingUrl = (playerState.currentEpisode && playerState.currentEpisode.url) || audio.currentSrc || "";
      console.warn("audio load error", failingUrl);
      alert("音频加载失败，请确认该节目音频文件存在且可访问。");
    });

    // 页面刷新/关闭前保存播放位置
    window.addEventListener("beforeunload", function () {
      var episodeUrl = (playerState.currentEpisode && playerState.currentEpisode.url) || "";
      if (episodeUrl && playerState.currentTime > 0) {
        try { localStorage.setItem("playback_pos_" + episodeUrl, String(playerState.currentTime)); } catch (_) {}
      }
    });
  }

  function resetDeepDiveFallbackStyles() {
    const stickyWrap = document.getElementById("deep-dive-sticky-wrap");
    const deepDiveSection = stickyWrap ? stickyWrap.querySelector("section") : null;
    if (!stickyWrap) return;
    deepDiveStickyState.mode = "sticky";
    stickyWrap.style.position = "";
    stickyWrap.style.top = "";
    stickyWrap.style.left = "";
    stickyWrap.style.width = "";
    stickyWrap.style.zIndex = "";
    stickyWrap.style.transform = "";
    stickyWrap.style.transition = "";
    stickyWrap.style.willChange = "";
    if (deepDiveSection) {
      deepDiveSection.style.maxHeight = "";
    }
  }

  function applyDeepDiveMode(stickyWrap, mode, options) {
    const prevRect = stickyWrap.getBoundingClientRect();

    if (mode === "sticky") {
      stickyWrap.style.position = "sticky";
      stickyWrap.style.top = options.topOffset + "px";
      stickyWrap.style.left = "";
      stickyWrap.style.width = "";
      stickyWrap.style.zIndex = "";
    } else if (mode === "fixed") {
      stickyWrap.style.position = "fixed";
      stickyWrap.style.top = options.topOffset + "px";
      stickyWrap.style.left = options.fixedLeft + "px";
      stickyWrap.style.width = options.fixedWidth + "px";
      stickyWrap.style.zIndex = "40";
    } else {
      stickyWrap.style.position = "absolute";
      stickyWrap.style.top = Math.max(0, options.absoluteTop) + "px";
      stickyWrap.style.left = "";
      stickyWrap.style.width = "100%";
      stickyWrap.style.zIndex = "20";
    }

    const nextRect = stickyWrap.getBoundingClientRect();
    const dx = prevRect.left - nextRect.left;
    const dy = prevRect.top - nextRect.top;
    stickyWrap.style.willChange = "transform";
    stickyWrap.style.transition = "none";
    stickyWrap.style.transform = "translate(" + dx + "px," + dy + "px)";
    window.requestAnimationFrame(function () {
      stickyWrap.style.transition = "transform 200ms cubic-bezier(0.22, 1, 0.36, 1)";
      stickyWrap.style.transform = "translate(0,0)";
    });

    deepDiveStickyState.mode = mode;
  }

  function updateDeepDiveFloatingFallback() {
    deepDiveStickyState.ticking = false;
    const trigger = document.getElementById("deep-dive-sticky-trigger");
    const stickyWrap = document.getElementById("deep-dive-sticky-wrap");
    const deepDiveSection = stickyWrap ? stickyWrap.querySelector("section") : null;
    const aside = document.getElementById("deep-dive-aside");
    const main = document.querySelector("main");
    if (!trigger || !stickyWrap || !deepDiveSection || !aside || !main) return;

    const isDesktop = window.matchMedia("(min-width: 1024px)").matches;
    if (!isDesktop) {
      resetDeepDiveFallbackStyles();
      return;
    }

    const topOffset = 96;
    const bottomSafe = 150;
    deepDiveSection.style.maxHeight = Math.max(260, window.innerHeight - topOffset - bottomSafe) + "px";

    const scrollY = window.scrollY || window.pageYOffset || 0;
    const asideRect = aside.getBoundingClientRect();
    const triggerRect = trigger.getBoundingClientRect();
    const triggerTopDoc = scrollY + triggerRect.top;
    const mainRect = main.getBoundingClientRect();
    const mainBottomDoc = scrollY + mainRect.bottom;
    const wrapHeight = stickyWrap.offsetHeight;
    const startFixY = triggerTopDoc - topOffset;
    const stopFixY = mainBottomDoc - wrapHeight - 24;
    const canFix = scrollY >= startFixY;
    const needStop = scrollY >= stopFixY;
    const nextMode = !canFix ? "sticky" : (needStop ? "absolute" : "fixed");

    if (nextMode === "fixed") {
      if (deepDiveStickyState.mode !== "fixed") {
        deepDiveStickyState.fixedLeft = asideRect.left;
        deepDiveStickyState.fixedWidth = asideRect.width;
      } else {
        deepDiveStickyState.fixedLeft = asideRect.left;
        deepDiveStickyState.fixedWidth = asideRect.width;
      }
    }

    const asideTopDoc = scrollY + asideRect.top;
    const absoluteTop = stopFixY - asideTopDoc;
    if (deepDiveStickyState.mode !== nextMode) {
      applyDeepDiveMode(stickyWrap, nextMode, {
        topOffset: topOffset,
        fixedLeft: deepDiveStickyState.fixedLeft,
        fixedWidth: deepDiveStickyState.fixedWidth,
        absoluteTop: absoluteTop,
      });
      return;
    }

    if (nextMode === "fixed") {
      stickyWrap.style.left = deepDiveStickyState.fixedLeft + "px";
      stickyWrap.style.width = deepDiveStickyState.fixedWidth + "px";
    } else if (nextMode === "absolute") {
      stickyWrap.style.top = Math.max(0, absoluteTop) + "px";
    }
  }

  function requestDeepDiveFloatingUpdate() {
    if (deepDiveStickyState.ticking) return;
    deepDiveStickyState.ticking = true;
    window.requestAnimationFrame(updateDeepDiveFloatingFallback);
  }

  function updateBackToTopVisibility() {
    const btn = document.getElementById("floating-back-to-top-btn");
    if (!btn) return;
    var scrollY = window.scrollY || window.pageYOffset || 0;
    var isTranscriptMode = detailViewState.mode === "transcript";
    var shouldShow = isTranscriptMode && scrollY > 3000;
    btn.classList.toggle("opacity-0", !shouldShow);
    btn.classList.toggle("pointer-events-none", !shouldShow);
  }

  function setupDeepDiveFloatingFallback() {
    window.addEventListener("scroll", requestDeepDiveFloatingUpdate, { passive: true });
    window.addEventListener("resize", requestDeepDiveFloatingUpdate);
    window.addEventListener("orientationchange", requestDeepDiveFloatingUpdate);
    requestDeepDiveFloatingUpdate();
    // back-to-top 按钮仅在逐字稿模式 + 滚动 3000px+ 后显示
    window.addEventListener("scroll", updateBackToTopVisibility, { passive: true });
    updateBackToTopVisibility();
  }

  async function load() {
    try {
      const id = getIdFromPath();
      let program = null;
      let lookupPrograms = [];

      // 优先：直接按 ID 查单条（最快，支持 ObjectId 和 programCode）
      if (id) {
        const detailResponse = await fetch("/api/programs/" + encodeURIComponent(id));
        if (detailResponse.ok) {
          program = await detailResponse.json();
          lookupPrograms = [program];
        }
      }

      // 未命中才拉列表（兜底）
      if (!program) {
        const listResponse = await fetch("/api/programs");
        if (!listResponse.ok) throw new Error("failed");
        let raw = await listResponse.json();
        let programs = Array.isArray(raw) ? raw : (Array.isArray(raw.programs) ? raw.programs : Array.isArray(raw.data) ? raw.data : []);
        if ((!programs || programs.length === 0) && localStorage.getItem("token")) {
          const adminResponse = await fetch("/api/admin/programs", {
            headers: { Authorization: "Bearer " + localStorage.getItem("token") },
          });
          if (adminResponse.ok) {
            const adminRaw = await adminResponse.json();
            programs = Array.isArray(adminRaw) ? adminRaw : (Array.isArray(adminRaw.programs) ? adminRaw.programs : Array.isArray(adminRaw.data) ? adminRaw.data : programs);
          }
        }
        const preferredPrograms = (programs || []).filter(function (item) { return !isTestProgram(item); });
        lookupPrograms = preferredPrograms.length ? preferredPrograms : (programs || []);
        program = findProgramByRouteId(lookupPrograms, id);
        if (!program && isNumericId(id)) {
          program = lookupPrograms.find(hasParsedContent) || null;
        }
        if (!program) program = pickBestProgram(lookupPrograms) || lookupPrograms[0];
      }

      if (program && !hasPlayableEpisodeUrl(program)) {
        const fallbackPlayable = lookupPrograms.find(hasPlayableEpisodeUrl);
        if (fallbackPlayable) program = fallbackPlayable;
      }
      if (!program) return;
      applyProgram(program, lookupPrograms);
    } catch (error) {
      console.warn("Program detail load failed", error);
    }
  }

  syncPlaybackRate();
  updateProgressUI();
  bindPlayerEvents();
  setupDeepDiveFloatingFallback();

  // === MindMap Renderer ===
  function buildMindMapMarkdown(node, level) {
    level = level || 1;
    var lines = [];
    var prefix = '#'.repeat(Math.min(level, 6));
    var emoji = node.emoji ? node.emoji + ' ' : '';
    lines.push(prefix + ' ' + emoji + node.title);
    if (node.summary && level <= 3) lines.push('> ' + node.summary);
    if (node.children && node.children.length) {
      lines.push('');
      node.children.forEach(function(child) {
        lines.push(buildMindMapMarkdown(child, level + 1));
      });
    }
    return lines.join('\n');
  }

  var mindMapRendered = false;
  var mindMapDataCache = null;
  function renderMindMapPanel() {
    var container = document.getElementById('mindmap-main-container');
    if (!container) return;
    if (!mindMapDataCache) {
      container.innerHTML = '<div class="flex items-center justify-center py-16 text-sm text-stone-400">暂无可用的脉络数据</div>';
      return;
    }
    if (mindMapRendered) return;
    try {
      var markdown = buildMindMapMarkdown(mindMapDataCache.root);
      var wrapper = document.createElement('div');
      wrapper.className = 'markmap';
      wrapper.innerHTML = '<pre class="markmap-code" style="display:none">' + markdown.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
      container.innerHTML = '';
      container.appendChild(wrapper);
      if (window.markmap) {
        window.markmap.autoLoader.renderAll();
        setTimeout(function() {
          var svg = container.querySelector('svg');
          if (svg) {
            svg.style.width = '100%';
            svg.style.height = 'auto';
            svg.removeAttribute('width');
            svg.removeAttribute('height');
            svg.style.display = 'block';
            var g = svg.querySelector('g');
            if (g) g.style.transform = '';
          }
        }, 400);
      }
      mindMapRendered = true;
    } catch(e) {
      console.warn('MindMap render failed', e);
      container.innerHTML = '<div class="flex items-center justify-center py-16 text-sm text-stone-400">脉络图渲染失败</div>';
    }
  }
  function initMindMapData(deepDive) {
    var mindMap = deepDive && deepDive.mindMap;
    if (!mindMap || !mindMap.root || !mindMap.root.title) return;
    mindMapDataCache = mindMap;
  }

  load();
})();
