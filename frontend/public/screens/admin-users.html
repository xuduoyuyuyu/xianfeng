<!DOCTYPE html>
<html class="dark" data-theme="dark" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>家长先疯 | 先疯管理 - 用户管理</title>
    <link href="/screens/admin.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          const t = localStorage.getItem("adminTheme");
          if (t === "light") {
            document.documentElement.dataset.theme = "light";
            document.documentElement.classList.remove("dark");
          }
        } catch (_e) {}
      })();
    </script>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        background-color: var(--panel);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-image: radial-gradient(var(--grid) 1px, transparent 1px);
        background-size: 56px 56px;
      }
      :root {
        --panel: #0b1020;
        --panel2: #0e1630;
        --ink: #e6e9f2;
        --muted: #98a2b3;
        --line: rgba(255, 255, 255, 0.08);
        --grid: rgba(94, 23, 235, 0.18);
        --r-shell: 28px;
        --r-card: 22px;
        --r-item: 16px;
        --r-control: 14px;
        --r-pill: 9999px;
      }
      html[data-theme="light"] {
        --panel: #f6f7fb;
        --panel2: #ffffff;
        --ink: #0f172a;
        --muted: #475569;
        --line: rgba(15, 23, 42, 0.12);
        --grid: rgba(94, 23, 235, 0.07);
      }
      html[data-theme="light"] .shadow-glow {
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.06), 0 18px 48px -28px rgba(15, 23, 42, 0.28) !important;
      }
      html[data-theme="light"] [class*="hover:bg-white/5"]:hover {
        background: rgba(15, 23, 42, 0.04) !important;
      }
      html[data-theme="light"] [class*="bg-white/5"] {
        background: rgba(15, 23, 42, 0.03) !important;
      }
      html[data-theme="light"] [class*="bg-white/10"] {
        background: rgba(15, 23, 42, 0.06) !important;
      }
      html[data-theme="light"] [class*="hover:bg-white/3"]:hover {
        background: rgba(15, 23, 42, 0.03) !important;
      }
      html[data-theme="light"] [class*="ring-white/10"] {
        box-shadow: inset 0 0 0 1px rgba(94, 23, 235, 0.16) !important;
      }
      html[data-theme="light"] aside {
        background: rgba(255, 255, 255, 0.92) !important;
        border-color: rgba(15, 23, 42, 0.12) !important;
        box-shadow: 12px 0 40px -28px rgba(15, 23, 42, 0.25);
        backdrop-filter: none !important;
      }
      html[data-theme="light"] aside a.bg-white\/5.ring-1 {
        background: rgba(94, 23, 235, 0.08) !important;
        color: #0f172a !important;
      }
      html[data-theme="light"] main > section {
        background: rgba(255, 255, 255, 0.92) !important;
        border-color: rgba(15, 23, 42, 0.12) !important;
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.04), 0 22px 60px -44px rgba(94, 23, 235, 0.18) !important;
      }
      html[data-theme="light"] main > section thead {
        background: rgba(15, 23, 42, 0.03) !important;
      }
      html[data-theme="light"] #users-table > tr:hover {
        background: rgba(15, 23, 42, 0.03) !important;
      }
      html[data-theme="light"] #search-input,
      html[data-theme="light"] #user-form input,
      html[data-theme="light"] #user-form select {
        background: #ffffff !important;
      }
      html[data-theme="light"] #close-modal-btn,
      html[data-theme="light"] #cancel-btn,
      html[data-theme="light"] #users-table button[data-action="edit"] {
        background: rgba(255, 255, 255, 0.92) !important;
      }
      html[data-theme="light"] #toast {
        background: rgba(255, 255, 255, 0.92) !important;
        border-color: rgba(15, 23, 42, 0.12) !important;
        box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.04), 0 22px 60px -44px rgba(15, 23, 42, 0.28) !important;
      }
      .theme-toggle {
        border-radius: var(--r-pill) !important;
        overflow: hidden;
      }
      .theme-toggle button[data-active="true"] {
        background: rgba(94, 23, 235, 0.14);
        color: #5e17eb;
      }
    </style>
  </head>
  <body>
    <div class="min-h-screen">
      <aside class="fixed inset-y-0 left-0 w-[280px] border-r border-line bg-panel/70 backdrop-blur-xl">
        <div class="flex h-full flex-col">
          <div class="flex items-center gap-3 px-6 pt-6 pb-5">
            <img alt="家长先疯" class="h-8 w-auto object-contain" src="/assets/logo.png" />
          </div>
          <nav class="flex-1 px-4 pb-4">
            <div class="mb-3 px-2 text-[11px] font-black uppercase tracking-[0.22em] text-muted/70">导航</div>
            <a data-nav="dashboard" href="/admin" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5">
              <span class="material-symbols-outlined text-[20px]">space_dashboard</span>
              数据概览
            </a>
            <div class="mt-6 mb-3 px-2 text-[11px] font-black uppercase tracking-[0.22em] text-muted/70">内容管理</div>
            <a data-nav="programs" href="/admin/programs" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5">
              <span class="material-symbols-outlined text-[20px]">podcasts</span>
              播客管理
            </a>
            <a data-nav="books" href="/admin/books" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5">
              <span class="material-symbols-outlined text-[20px]">menu_book</span>
              书单管理
            </a>
            <a data-nav="materials" href="/admin/materials" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5">
              <span class="material-symbols-outlined text-[20px]">school</span>
              学习资料
            </a>
            <div class="mt-6 mb-3 px-2 text-[11px] font-black uppercase tracking-[0.22em] text-muted/70">系统</div>
            <a data-nav="users" href="/admin/users" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5">
              <span class="material-symbols-outlined text-[20px]">group</span>
              用户管理
            </a>
            <a data-nav="system" href="/admin/system" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-bold text-ink/90 hover:bg-white/5">
              <span class="material-symbols-outlined text-[20px]">settings</span>
              系统信息
            </a>
          </nav>
          <div class="border-t border-line p-4">
            <div class="flex items-center justify-between rounded-2xl bg-white/5 px-4 py-3">
              <div class="flex items-center gap-3">
                <div id="admin-avatar" class="flex h-9 w-9 items-center justify-center rounded-xl bg-primary/20 text-sm font-black text-primary">A</div>
                <div class="flex flex-col">
                  <div id="admin-username" class="text-sm font-bold text-ink/90">管理员</div>
                  <div class="text-[11px] font-bold text-muted/80">已登录</div>
                </div>
              </div>
              <button id="admin-logout-btn" class="flex h-9 w-9 items-center justify-center rounded-xl border border-line bg-panel2/60 text-ink/70 hover:text-ink" type="button" aria-label="登出">
                <span class="material-symbols-outlined text-[20px]">logout</span>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <main class="ml-[280px] min-h-screen px-10 py-8">
        <header class="mb-7 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div></div>
          <div class="flex flex-wrap items-center gap-3">
            <div class="theme-toggle flex overflow-hidden rounded-2xl border border-line bg-panel2/60">
              <button id="theme-dark-btn" type="button" class="flex h-11 w-11 items-center justify-center border-r border-line text-ink/70 hover:text-ink" aria-label="深色模式">
                <span class="material-symbols-outlined text-[20px]">dark_mode</span>
              </button>
              <button id="theme-light-btn" type="button" class="flex h-11 w-11 items-center justify-center text-ink/70 hover:text-ink" aria-label="浅色模式">
                <span class="material-symbols-outlined text-[20px]">light_mode</span>
              </button>
            </div>
            <div class="relative">
              <input
                id="search-input"
                class="w-[320px] rounded-2xl border border-line bg-panel2/60 px-5 py-3 text-sm font-bold text-ink/90 placeholder:text-muted/70 focus:border-primary/60 focus:ring-4 focus:ring-primary/10 admin-form-input"
                placeholder="搜索用户名、城市、区域、年级..."
                type="text"
              />
              <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-[20px] text-muted/80">search</span>
            </div>
            <button
              id="create-user-btn"
              class="rounded-2xl bg-primary px-5 py-3 text-sm font-black text-white hover:opacity-95"
              type="button"
            >
              <span class="material-symbols-outlined mr-2 align-[-4px] text-[20px]">add_circle</span>
              新建用户
            </button>
          </div>
        </header>

        <section class="rounded-3xl border border-line bg-panel2/60 shadow-[0_0_0_1px_rgba(255,255,255,0.06)]">
          <div class="overflow-x-auto">
            <table class="w-full min-w-[920px] text-left">
              <thead class="border-b border-line bg-panel/40 text-[11px] font-black uppercase tracking-[0.22em] text-muted/70">
                <tr>
                  <th class="px-8 py-5">用户</th>
                  <th class="px-8 py-5">城市</th>
                  <th class="px-8 py-5">区域</th>
                  <th class="px-8 py-5">孩子年级</th>
                  <th class="px-8 py-5">角色</th>
                  <th class="px-8 py-5">创建时间</th>
                  <th class="px-8 py-5 text-right">操作</th>
                </tr>
              </thead>
              <tbody id="users-table" class="divide-y divide-white/5"></tbody>
            </table>
          </div>
        </section>

        <div id="toast" class="pointer-events-none fixed bottom-6 right-6 hidden max-w-md rounded-2xl border border-line bg-panel2/80 px-5 py-4 text-sm font-bold text-ink shadow-2xl backdrop-blur-xl"></div>
      </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[70] hidden items-center justify-center bg-black/35 p-6 backdrop-blur-sm">
      <div class="w-full max-w-2xl rounded-3xl border border-line bg-panel2/90 p-7 shadow-2xl">
        <div class="mb-6 flex items-center justify-between">
          <div>
            <div id="modal-title" class="text-2xl font-black tracking-tight">新建用户</div>
            <div class="mt-1 text-sm font-bold text-muted/80">管理用户基础字段：城市/区域/孩子年级。</div>
          </div>
          <button id="close-modal-btn" class="flex h-10 w-10 items-center justify-center rounded-2xl border border-line bg-panel/60 text-ink/70 hover:text-ink" type="button">
            <span class="material-symbols-outlined text-[20px]">close</span>
          </button>
        </div>

        <form id="user-form" class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <input id="field-username" class="rounded-2xl border border-line bg-panel/60 px-5 py-3 text-sm font-bold text-ink/90 placeholder:text-muted/70 admin-form-input" placeholder="用户名" />
          <select id="field-role" class="rounded-2xl border border-line bg-panel/60 px-5 py-3 text-sm font-bold text-ink/90 admin-form-select">
            <option value="user">普通用户</option>
            <option value="admin">管理员</option>
          </select>
          <input id="field-city" class="rounded-2xl border border-line bg-panel/60 px-5 py-3 text-sm font-bold text-ink/90 placeholder:text-muted/70 admin-form-input" placeholder="城市（如 上海）" />
          <input id="field-region" class="rounded-2xl border border-line bg-panel/60 px-5 py-3 text-sm font-bold text-ink/90 placeholder:text-muted/70 admin-form-input" placeholder="区域（如 浦东新区）" />
          <input id="field-grade" class="rounded-2xl border border-line bg-panel/60 px-5 py-3 text-sm font-bold text-ink/90 placeholder:text-muted/70 md:col-span-2 admin-form-input" placeholder="孩子年级（如 小学一年级）" />
          <input id="field-password" class="rounded-2xl border border-line bg-panel/60 px-5 py-3 text-sm font-bold text-ink/90 placeholder:text-muted/70 md:col-span-2 admin-form-input" placeholder="密码（编辑时留空表示不修改）" type="password" />
          <div class="mt-2 flex justify-end gap-3 md:col-span-2">
            <button id="cancel-btn" type="button" class="rounded-2xl border border-line bg-panel/60 px-5 py-3 text-sm font-black text-ink/80 hover:bg-white/5">取消</button>
            <button id="save-btn" type="submit" class="rounded-2xl bg-primary px-6 py-3 text-sm font-black text-white hover:opacity-95">保存</button>
          </div>
          <div id="form-hint" class="md:col-span-2 text-xs font-bold text-muted/80"></div>
        </form>
      </div>
    </div>

    <script>
      (function () {
        function isEmbedded() {
          try {
            return window.self !== window.top;
          } catch (_e) {
            return true;
          }
        }

        function requestNavigate(path) {
          try {
            window.parent.postMessage({ type: "admin:navigate", path: path }, window.location.origin);
          } catch (_e) {}
        }

        const token = localStorage.getItem("token");
        if (!token) {
          if (isEmbedded()) {
            requestNavigate("/admin/login");
            return;
          }
          window.location.href = "/admin/login";
          return;
        }

        function applyTheme(theme) {
          const normalized = theme === "light" ? "light" : "dark";
          document.documentElement.dataset.theme = normalized;
          if (normalized === "dark") {
            document.documentElement.classList.add("dark");
          } else {
            document.documentElement.classList.remove("dark");
          }
          const darkBtn = document.getElementById("theme-dark-btn");
          const lightBtn = document.getElementById("theme-light-btn");
          if (darkBtn) darkBtn.setAttribute("data-active", normalized === "dark" ? "true" : "false");
          if (lightBtn) lightBtn.setAttribute("data-active", normalized === "light" ? "true" : "false");
        }

        const savedTheme = localStorage.getItem("adminTheme") || "dark";
        applyTheme(savedTheme);
        const darkBtn = document.getElementById("theme-dark-btn");
        const lightBtn = document.getElementById("theme-light-btn");
        if (darkBtn) {
          darkBtn.addEventListener("click", function () {
            localStorage.setItem("adminTheme", "dark");
            applyTheme("dark");
          });
        }
        if (lightBtn) {
          lightBtn.addEventListener("click", function () {
            localStorage.setItem("adminTheme", "light");
            applyTheme("light");
          });
        }

        const userRaw = localStorage.getItem("user");
        const sessionUser = userRaw ? JSON.parse(userRaw) : null;
        const username = (sessionUser && (sessionUser.username || sessionUser.name)) || "管理员";
        const avatarEl = document.getElementById("admin-avatar");
        const usernameEl = document.getElementById("admin-username");
        if (usernameEl) usernameEl.textContent = username;
        if (avatarEl) avatarEl.textContent = String(username || "A").slice(0, 1).toUpperCase();

        const currentPath = window.location.pathname || "/admin/users";
        const map = {
          "/admin": "dashboard",
          "/admin/": "dashboard",
          "/admin/programs": "programs",
          "/admin/books": "books",
          "/admin/materials": "materials",
          "/admin/users": "users",
          "/admin/system": "system",
          "/screens/admin-dashboard.html": "dashboard",
          "/screens/admin-programs.html": "programs",
          "/screens/admin-books.html": "books",
          "/screens/admin-materials.html": "materials",
          "/screens/admin-users.html": "users",
          "/screens/admin-system.html": "system",
        };
        const activeKey = map[currentPath] || "users";
        const activeLink = document.querySelector('[data-nav="' + activeKey + '"]');
        if (activeLink) {
          activeLink.classList.add("bg-white/5", "ring-1", "ring-white/10");
        }

        const logoutBtn = document.getElementById("admin-logout-btn");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", function () {
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            if (isEmbedded()) {
              requestNavigate("/admin/login");
              return;
            }
            window.location.href = "/admin/login";
          });
        }

        document.addEventListener(
          "click",
          function (event) {
            const target = event.target;
            const link = target && target.closest ? target.closest('a[href^="/admin"]') : null;
            if (!link) return;
            if (!isEmbedded()) return;
            const href = link.getAttribute("href");
            if (!href) return;
            event.preventDefault();
            if (href === "/admin/login") {
              requestNavigate(href);
              return;
            }
            const routeMap = {
              "/admin": "dashboard",
              "/admin/": "dashboard",
              "/admin/programs": "programs",
              "/admin/books": "books",
              "/admin/materials": "materials",
              "/admin/users": "users",
              "/admin/system": "system",
            };
            const key = routeMap[href];
            if (key) {
              try {
                window.parent.postMessage({ type: "admin:switch", key: key }, window.location.origin);
              } catch (_e) {}
            }
          },
          true
        );

        function authHeaders() {
          return {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token,
          };
        }

        const table = document.getElementById("users-table");
        const searchInput = document.getElementById("search-input");
        const createBtn = document.getElementById("create-user-btn");
        const toast = document.getElementById("toast");

        const modal = document.getElementById("modal");
        const modalTitle = document.getElementById("modal-title");
        const closeModalBtn = document.getElementById("close-modal-btn");
        const cancelBtn = document.getElementById("cancel-btn");
        const form = document.getElementById("user-form");
        const saveBtn = document.getElementById("save-btn");
        const formHint = document.getElementById("form-hint");

        const fieldUsername = document.getElementById("field-username");
        const fieldRole = document.getElementById("field-role");
        const fieldCity = document.getElementById("field-city");
        const fieldRegion = document.getElementById("field-region");
        const fieldGrade = document.getElementById("field-grade");
        const fieldPassword = document.getElementById("field-password");

        let users = [];
        let editingId = null;
        let keyword = "";

        function showToast(message) {
          if (!toast) return;
          toast.textContent = message;
          toast.classList.remove("hidden");
          clearTimeout(showToast._t);
          showToast._t = setTimeout(function () {
            toast.classList.add("hidden");
          }, 2400);
        }

        function fmtDate(input) {
          if (!input) return "-";
          const d = new Date(input);
          if (Number.isNaN(d.getTime())) return "-";
          return d.toLocaleDateString("zh-CN");
        }

        function initials(name) {
          const raw = String(name || "").trim();
          if (!raw) return "U";
          return raw.slice(0, 1).toUpperCase();
        }

        function openModal(user) {
          editingId = user ? user._id : null;
          modalTitle.textContent = editingId ? "编辑用户" : "新建用户";
          fieldUsername.value = user ? (user.username || "") : "";
          fieldRole.value = user ? (user.role || "user") : "user";
          fieldCity.value = user ? (user.city || "") : "";
          fieldRegion.value = user ? (user.region || "") : "";
          fieldGrade.value = user ? (user.childGrade || "") : "";
          fieldPassword.value = "";
          formHint.textContent = editingId ? "可选修改密码：留空表示不修改。" : "创建用户必须填写密码。";
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }

        function closeModal() {
          modal.classList.remove("flex");
          modal.classList.add("hidden");
          editingId = null;
        }

        async function fetchUsers() {
          const res = await fetch("/api/users", { headers: authHeaders() });
          if (!res.ok) throw new Error("用户列表加载失败");
          return await res.json();
        }

        function render() {
          const normalized = String(keyword || "").trim().toLowerCase();
          const filtered = normalized
            ? users.filter((u) => (u.username + " " + (u.city || "") + " " + (u.region || "") + " " + (u.childGrade || "")).toLowerCase().includes(normalized))
            : users;

          if (!table) return;
          if (!filtered.length) {
            table.innerHTML =
              '<tr><td colspan="7" class="px-8 py-10 text-sm font-bold text-muted/80">暂无用户数据</td></tr>';
            return;
          }

          table.innerHTML = filtered
            .map((u) => {
              const roleBadge =
                u.role === "admin"
                  ? '<span class="rounded-full bg-primary/15 px-3 py-1 text-[11px] font-black text-primary">admin</span>'
                  : '<span class="rounded-full bg-white/10 px-3 py-1 text-[11px] font-black text-ink/70">user</span>';
              return (
                '<tr class="hover:bg-white/3">' +
                '<td class="px-8 py-5">' +
                '<div class="flex items-center gap-4">' +
                '<div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-white/10 text-sm font-black text-ink/80">' +
                initials(u.username) +
                "</div>" +
                '<div class="flex flex-col">' +
                '<div class="text-sm font-black text-ink/90">' +
                (u.username || "-") +
                "</div>" +
                '<div class="text-[11px] font-bold text-muted/80">' +
                (String(u._id || "").slice(-8).toUpperCase() || "-") +
                "</div>" +
                "</div>" +
                "</div>" +
                "</td>" +
                '<td class="px-8 py-5 text-sm font-bold text-ink/80">' +
                (u.city || "-") +
                "</td>" +
                '<td class="px-8 py-5 text-sm font-bold text-ink/80">' +
                (u.region || "-") +
                "</td>" +
                '<td class="px-8 py-5 text-sm font-bold text-ink/80">' +
                (u.childGrade || "-") +
                "</td>" +
                '<td class="px-8 py-5">' +
                roleBadge +
                "</td>" +
                '<td class="px-8 py-5 text-sm font-bold text-muted/80">' +
                fmtDate(u.createdAt) +
                "</td>" +
                '<td class="px-8 py-5 text-right">' +
                '<div class="inline-flex gap-2">' +
                '<button data-action="edit" data-id="' +
                u._id +
                '" class="rounded-2xl border border-line bg-panel/60 px-4 py-2 text-xs font-black text-ink/80 hover:bg-white/5">编辑</button>' +
                '<button data-action="delete" data-id="' +
                u._id +
                '" class="rounded-2xl border border-red-500/20 bg-red-500/10 px-4 py-2 text-xs font-black text-red-200 hover:bg-red-500/15">删除</button>' +
                "</div>" +
                "</td>" +
                "</tr>"
              );
            })
            .join("");
        }

        async function load() {
          try {
            users = await fetchUsers();
            render();
          } catch (_e) {
            if (table) {
              table.innerHTML =
                '<tr><td colspan="7" class="px-8 py-10 text-sm font-bold text-red-200">加载失败，请检查后端服务与登录状态</td></tr>';
            }
          }
        }

        async function saveUser(event) {
          event.preventDefault();
          const payload = {
            username: String(fieldUsername.value || "").trim(),
            role: fieldRole.value,
            city: String(fieldCity.value || "").trim(),
            region: String(fieldRegion.value || "").trim(),
            childGrade: String(fieldGrade.value || "").trim(),
            password: String(fieldPassword.value || "").trim(),
          };

          if (!payload.username) {
            showToast("请填写用户名");
            return;
          }
          if (!editingId && !payload.password) {
            showToast("新建用户必须填写密码");
            return;
          }

          saveBtn.disabled = true;
          saveBtn.textContent = "保存中...";
          try {
            if (editingId) {
              const res = await fetch("/api/users/" + editingId, {
                method: "PUT",
                headers: authHeaders(),
                body: JSON.stringify(payload),
              });
              const data = await res.json().catch(function () { return {}; });
              if (!res.ok) throw new Error((data && data.message) || "更新失败");
              showToast("已保存");
            } else {
              const res = await fetch("/api/users/register", {
                method: "POST",
                headers: authHeaders(),
                body: JSON.stringify(payload),
              });
              const data = await res.json().catch(function () { return {}; });
              if (!res.ok) throw new Error((data && data.message) || "创建失败");
              showToast("已创建用户");
            }
            closeModal();
            await load();
          } catch (e) {
            showToast((e && e.message) ? e.message : "保存失败");
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = "保存";
          }
        }

        async function deleteUser(id) {
          if (!window.confirm("确认删除该用户吗？")) return;
          try {
            const res = await fetch("/api/users/" + id, { method: "DELETE", headers: authHeaders() });
            const data = await res.json().catch(function () { return {}; });
            if (!res.ok) throw new Error((data && data.message) || "删除失败");
            showToast("已删除");
            await load();
          } catch (e) {
            showToast((e && e.message) ? e.message : "删除失败");
          }
        }

        if (createBtn) createBtn.addEventListener("click", function () { openModal(null); });
        if (closeModalBtn) closeModalBtn.addEventListener("click", closeModal);
        if (cancelBtn) cancelBtn.addEventListener("click", closeModal);
        if (modal) modal.addEventListener("click", function (event) { if (event.target === modal) closeModal(); });
        if (form) form.addEventListener("submit", saveUser);

        if (searchInput) {
          searchInput.addEventListener("input", function () {
            keyword = searchInput.value || "";
            render();
          });
        }

        if (table) {
          table.addEventListener("click", function (event) {
            const btn = event.target.closest("button[data-action]");
            if (!btn) return;
            const action = btn.getAttribute("data-action");
            const id = btn.getAttribute("data-id");
            const u = users.find((item) => item._id === id);
            if (action === "edit" && u) openModal(u);
            if (action === "delete" && id) deleteUser(id);
          });
        }

        load();
      })();
    </script>
  </body>
</html>
